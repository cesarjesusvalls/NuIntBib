- bibtag: MiniBooNE:2018dus
  title: First Measurement of Monoenergetic Muon Neutrino Charged Current Interactions
  collaboration: MiniBooNE
  arxiv: '1801.03848'
  doi: 10.1103/PhysRevLett.120.141802
  journal: Phys.Rev.Lett.
  volume: '120'
  pages: '141802'
  year: 2018
  published_date: '2018-01-11'
  inspire_recid: 1647569
  citation_count: 64
  abstract: We report the first measurement of monoenergetic muon neutrino charged current interactions.
    MiniBooNE has isolated 236 MeV muon neutrino events originating from charged kaon decay at rest ($K^+
    \rightarrow \mu^+ \nu_\mu$) at the NuMI beamline absorber. These signal $\nu_\mu$-carbon events are
    distinguished from primarily pion decay in flight $\nu_\mu$ and $\overline{\nu}_\mu$ backgrounds produced
    at the target station and decay pipe using their arrival time and reconstructed muon energy. The significance
    of the signal observation is at the 3.9$\sigma$ level. The muon kinetic energy, neutrino-nucleus energy
    transfer ($\omega=E_\nu-E_\mu$), and total cross section for these events is extracted. This result
    is the first known-energy, weak-interaction-only probe of the nucleus to yield a measurement of $\omega$
    using neutrinos, a quantity thus far only accessible through electron scattering.
  added: '2024-12-09'
