  year: 2024
  published_date: '2023-11-08'
  inspire_recid: 2720510
  citation_count: 99
  abstract: We present a measurement of neutrino oscillation parameters with the Super-Kamiokande detector
    using atmospheric neutrinos from the complete pure-water SK I-V (April 1996-July 2020) data set, including
    events from an expanded fiducial volume. The data set corresponds to 6511.3 live days and an exposure
    of 484.2 kiloton-years. Measurements of the neutrino oscillation parameters $\Delta m^2_{32}$, $\sin^2\theta_{23}$,
    $\sin^2 \theta_{13}$, $\delta_{CP}$, and the preference for the neutrino mass ordering are presented
    with atmospheric neutrino data alone, and with constraints on $\sin^2 \theta_{13}$ from reactor neutrino
    experiments. Our analysis including constraints on $\sin^2 \theta_{13}$ favors the normal mass ordering
    at the 92.3% level.
