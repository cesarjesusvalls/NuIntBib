- bibtag: IceCube:2017lak
  title: Measurement of Atmospheric Neutrino Oscillations at 6–56 GeV with IceCube DeepCore
  collaboration: IceCube
  arxiv: '1707.07081'
  doi: 10.1103/PhysRevLett.120.071801
  journal: Phys.Rev.Lett.
  volume: '120'
