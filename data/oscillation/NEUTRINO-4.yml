  title: First Observation of the Oscillation Effect in the Neutrino-4 Experiment on the Search for the
    Sterile Neutrino
  collaboration: NEUTRINO-4
  arxiv: '1809.10561'
  doi: 10.1134/S0021364019040040
  journal: Pisma Zh.Eksp.Teor.Fiz.
  volume: '109'
