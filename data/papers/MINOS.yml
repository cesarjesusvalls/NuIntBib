    measurement_type: total
    observables: total cross section
    energy_notes: mean E=4.9GeV
- bibtag: MINOS:2014axb
  title: Study of Quasielastic Scattering using Charged-Current νμ -Iron Interactions in the MINOS Near
    Detector
  collaboration: MINOS
  arxiv: '1410.8613'
  doi: 10.1103/PhysRevD.91.012005
  journal: Phys.Rev.D
  volume: '91'
  pages: '012005'
  year: 2015
  published_date: '2014-10-30'
  inspire_recid: 1325543
  citation_count: 117
  abstract: Kinematic distributions from an inclusive sample of 1.41 x 10^6 charged-current nu_mu interactions
    on iron, obtained using the MINOS Near Detector exposed to a wide-band beam with peak flux at 3 GeV,
    are compared to a conventional treatment of neutrino scattering within a Fermi gas nucleus. Results
    are used to guide the selection of a subsample enriched in quasielastic nu_mu Fe interactions, containing
    an estimated 123,000 quasielastic events of incident energies 1 < E_nu < 8 GeV, with <E_nu> = 2.79
    GeV. Four additional subsamples representing topological and kinematic sideband regions to quasielastic
    scattering are also selected for the purpose of evaluating backgrounds. Comparisons using subsample
    distributions in four-momentum transfer Q^2 show the Monte Carlo model to be inadequate at low Q^2.
    Its shortcomings are remedied via inclusion of a Q^2-dependent suppression function for baryon resonance
    production, developed from the data. A chi-square fit of the resulting Monte Carlo simulation to the
    shape of the Q^2 distribution for the quasielastic-enriched sample is carried out with the axial-vector
    mass M_A of the dipole axial-vector form factor of the neutron as a free parameter. The effective
    M_A which best describes the data is 1.23 +0.13/-0.09 (fit) +0.12/-0.15 (syst.) GeV.
  added: '2024-12-09'
  notes: null
  links:
    arxiv: https://arxiv.org/abs/1410.8613
    doi: https://doi.org/10.1103/PhysRevD.91.012005
    inspire: https://inspirehep.net/literature?q=texkeys.raw:MINOS:2014axb
