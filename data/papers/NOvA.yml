- bibtag: NOvA:2019bdw
  title: Measurement of neutrino-induced neutral-current coherent $\pi^0$  production in the NOvA near
    detector
  collaboration: NOvA
  arxiv: '1902.00558'
  doi: 10.1103/PhysRevD.102.012004
  journal: Phys.Rev.D
  volume: '102'
  pages: '012004'
  year: 2020
  published_date: '2019-02-01'
  inspire_recid: 1718411
  citation_count: 44
  abstract: The cross section of neutrino-induced neutral-current coherent $\pi^0$ production on a carbon-dominated
    target is measured in the NOvA near detector. This measurement uses a narrow-band neutrino beam with
    the average neutrino energy of 2.7\,GeV, xwhich is of interest to the ongoing and future long-baseline
    neutrino oscillation experiments. The measured, flux-averaged cross section is $\sigma = 14.0\pm0.9$\,(stat.)$\pm2.1$\,(syst.)$\times
    10^{-40}$ $\text{cm}^2/$nucleus, consistent with model prediction. This result is the most precise
    measurement of neutral-current coherent $\pi^0$ production in the few-GeV neutrino energy region.
