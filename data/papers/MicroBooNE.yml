- bibtag: MicroBooNE:2025kqo
  title: First Measurement of Charged-Current Muon-Neutrino-Induced <math display="inline"><msup><mi>K</mi><mo>+</mo></msup></math>
    Production on Argon Using the MicroBooNE Detector
  collaboration: MicroBooNE
