- bibtag: Super-Kamiokande:2022lyl
  title: Testing Non-Standard Interactions Between Solar Neutrinos and Quarks with Super-Kamiokande
  collaboration: Super-Kamiokande
  arxiv: '2203.11772'
  doi: null
  journal: null
