  abstract: This letter reports the first direct observation of muon antineutrino disappearance. The MINOS
    experiment has taken data with an accelerator beam optimized for muon antineutrino production, accumulating
    an exposure of $1.71\times 10^{20}$ protons on target. In the Far Detector, 97 charged current muon
