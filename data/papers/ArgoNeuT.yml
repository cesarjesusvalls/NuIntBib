- bibtag: ArgoNeuT:2011bms
  title: First Measurements of Inclusive Muon Neutrino Charged Current Differential Cross Sections on
    Argon
  collaboration: ArgoNeuT
  arxiv: '1111.0103'
  doi: 10.1103/PhysRevLett.108.161802
  journal: Phys.Rev.Lett.
  volume: '108'
  pages: '161802'
  year: 2012
  published_date: 2011-11
  inspire_recid: 943972
  citation_count: 151
  abstract: The ArgoNeuT collaboration presents the first measurements of inclusive muon neutrino charged
    current differential cross sections on argon. Obtained in the NuMI neutrino beamline at Fermilab,
    the results are reported in terms of outgoing muon angle and momentum. The data are consistent with
    the Monte Carlo expectation across the full range of kinematics sampled, $0^\circ$$<\theta_\mu$$<36^\circ$
    and 0$<P_\mu$$<25$ GeV/c. Along with confirming the viability of liquid argon time projection chamber
    technology for neutrino detection, the measurements allow tests of low energy neutrino scattering
    models important for interpreting results from long baseline neutrino oscillation experiments designed
    to investigate CP violation and the orientation of the neutrino mass hierarchy.
