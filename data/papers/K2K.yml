- bibtag: K2K:2004qpv
  title: Measurement of single pi0 production in neutral current neutrino interactions with water by a
    1.3-GeV wide band muon neutrino beam
  collaboration: K2K
  arxiv: hep-ex/0408134
  doi: 10.1016/j.physletb.2005.05.044
  journal: Phys.Lett.B
  volume: '619'
  pages: '255'
  year: 2005
  published_date: 2004-08
  inspire_recid: 657451
  citation_count: 138
  abstract: Neutral current single pi0 production induced by neutrinos with a mean energy of 1.3 GeV is
    measured at a 1000 ton water Cherenkov detector as a near detector of the K2K long baseline neutrino
    experiment. The cross section for this process relative to the total charged current cross section
    is measured to be 0.064 +- 0.001 (stat.) +- 0.007 (sys.). The momentum distribution of produced pi0s
    is measured and is found to be in good agreement with an expectation from the present knowledge of
    the neutrino cross sections.
  added: '2024-12-09'
