- bibtag: FASER:2024hoe
  title: First Measurement of <math display="inline"><msub><mi>ν</mi><mi>e</mi></msub></math> and <math
    display="inline"><msub><mi>ν</mi><mi>μ</mi></msub></math> Interaction Cross Sections at the LHC with
    FASER’s Emulsion Detector
  collaboration: FASER
