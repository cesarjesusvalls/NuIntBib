- bibtag: COHERENT:2020iec
  title: First Measurement of Coherent Elastic Neutrino-Nucleus Scattering on Argon
  collaboration: COHERENT
  arxiv: '2003.10630'
  doi: 10.1103/PhysRevLett.126.012002
  journal: Phys.Rev.Lett.
  volume: '126'
  pages: '012002'
  year: 2021
  published_date: '2020-04-03'
  inspire_recid: 1787880
  citation_count: 432
  abstract: We report the first measurement of coherent elastic neutrino-nucleus scattering (\cevns) on
    argon using a liquid argon detector at the Oak Ridge National Laboratory Spallation Neutron Source.
    Two independent analyses prefer \cevns over the background-only null hypothesis with greater than
    $3\sigma$ significance. The measured cross section, averaged over the incident neutrino flux, is (2.2
    $\pm$ 0.7) $\times$10$^{-39}$ cm$^2$ -- consistent with the standard model prediction. The neutron-number
    dependence of this result, together with that from our previous measurement on CsI, confirms the existence
    of the \cevns process and provides improved constraints on non-standard neutrino interactions.
