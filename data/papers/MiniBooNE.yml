- bibtag: MiniBooNE:2013qnd
  title: First measurement of the Muon Antineutrino Double-Differential Charged-Current Quasi-Elastic
    Cross Section
  collaboration: MiniBooNE
  arxiv: '1301.7067'
  doi: 10.1103/PhysRevD.88.032001
  journal: Phys.Rev.D
  volume: '88'
  pages: '032001'
  year: 2013
  published_date: 2013-01
  inspire_recid: 1216885
  citation_count: 264
  abstract: The largest sample ever recorded of $\numub$ charged-current quasi-elastic (CCQE, $\numub
    + p \to \mup + n$) candidate events is used to produce the minimally model-dependent, flux-integrated
    double-differential cross section $\frac{d^{2}\sigma}{dT_\mu d\uz}$ for $\numub$ incident on mineral
    oil. This measurement exploits the unprecedented statistics of the MiniBooNE anti-neutrino mode sample
    and provides the most complete information of this process to date. Also given to facilitate historical
    comparisons are the flux-unfolded total cross section $\sigma(E_\nu)$ and single-differential cross
    section $\frac{d\sigma}{d\qsq}$ on both mineral oil and on carbon by subtracting the $\numub$ CCQE
    events on hydrogen. The observed cross section is somewhat higher than the predicted cross section
    from a model assuming independently-acting nucleons in carbon with canonical form factor values. The
    shape of the data are also discrepant with this model. These results have implications for intra-nuclear
    processes and can help constrain signal and background processes for future neutrino oscillation measurements.
  added: '2024-12-09'
