- bibtag: K2K:2004iot
  title: Evidence for muon neutrino oscillation in an accelerator-based experiment
  collaboration: K2K
  arxiv: hep-ex/0411038
  doi: 10.1103/PhysRevLett.94.081802
  journal: Phys.Rev.Lett.
  volume: '94'
  pages: 081802
  year: 2005
  published_date: 2004-11
  inspire_recid: 664193
  citation_count: 656
  abstract: We present results for muon neutrino oscillation in the KEK to Kamioka (K2K) long-baseline
    neutrino oscillation experiment. K2K uses an accelerator-produced muon neutrino beam with a mean energy
    of 1.3 GeV directed at the Super-Kamiokande detector. We observed the energy dependent disappearance
    of muon neutrino, which we presume have oscillated to tau neutrino. The probability that we would
    observe these results if there is no neutrino oscillation is 0.0050% (4.0 sigma).
