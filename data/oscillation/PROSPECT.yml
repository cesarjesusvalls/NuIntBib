- bibtag: PROSPECT:2018dtt
  title: First search for short-baseline neutrino oscillations at HFIR with PROSPECT
  collaboration: PROSPECT
  arxiv: '1806.02784'
  doi: 10.1103/PhysRevLett.121.251802
  journal: Phys.Rev.Lett.
  volume: '121'
  pages: '251802'
  year: 2018
  published_date: '2018-06-07'
  inspire_recid: 1676812
  citation_count: 184
  abstract: This Letter reports the first scientific results from the observation of antineutrinos emitted
    by fission products of $^{235}$U at the High Flux Isotope Reactor. PROSPECT, the Precision Reactor
    Oscillation and Spectrum Experiment, consists of a segmented 4 ton $^6$Li-doped liquid scintillator
    detector covering a baseline range of 7-9 m from the reactor and operating under less than 1 meter
    water equivalent overburden. Data collected during 33 live-days of reactor operation at a nominal
    power of 85 MW yields a detection of 25461 $\pm$ 283 (stat.) inverse beta decays. Observation of reactor
    antineutrinos can be achieved in PROSPECT at 5$\sigma$ statistical significance within two hours of
    on-surface reactor-on data-taking. A reactor-model independent analysis of the inverse beta decay
    prompt energy spectrum as a function of baseline constrains significant portions of the previously
    allowed sterile neutrino oscillation parameter space at 95% confidence level and disfavors the best
    fit of the Reactor Antineutrino Anomaly at 2.2$\sigma$ confidence level.
