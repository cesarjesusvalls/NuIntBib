  abstract: We report a measurement of the muon neutrino charged-current (CC) interaction cross section
    on tungsten using the electronic detectors of the SND@LHC experiment at the CERN Large Hadron Collider.
    The analysis uses proton--proton collision data at a centre-of-mass energy of $\sqrt{s} = 13.6$ TeV,
    corresponding to an integrated luminosity of $68.6 ~\text{fb}^{-1}$ collected during LHC Run 3 in
    2022 and 2023. A total of 31 $ν_μ$ CC candidates are selected against an expected background of $5.0
    \pm 1.1$ events, consistent with a signal expectation of $24^{+10}_{-9}$ events. The signal strength
    is measured to be $\hatμ = 1.09^{+0.72}_{-0.37}$, and the combined muon neutrino and anti-neutrino
    CC cross section on tungsten is determined to be $σ(ν_μ+ \barν_μ) = (37^{+24}_{-12})\times 10^{-35}~\text{cm}^2$
    at a median energy of $228$ GeV. In addition, a calorimetric measurement of the hadronic energies
    of the neutrino candidate events is performed, making use of calibration data from dedicated test-beam
    campaigns.
