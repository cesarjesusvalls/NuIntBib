  abstract: Results are presented on the exclusive charged current antineutrino production of one pion
    using the data of the Gargamelle propane experiment at CERN PS. The isospin structure of the charged
    weak current is studied as well as the energy dependence of the total cross section for π − antineutrino
    production, which is compared with the prediction of the Adler model.
