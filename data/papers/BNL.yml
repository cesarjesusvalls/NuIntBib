- bibtag: Fanourakis:1980si
  title: Study of Low-energy Anti-neutrino Interactions on Protons
  collaboration: BNL
  arxiv: null
  doi: 10.1103/PhysRevD.21.562
  journal: Phys.Rev.D
  volume: '21'
  pages: '562'
  year: 1980
  published_date: 1980-03
  inspire_recid: 9011
  citation_count: 70
  abstract: We present a study of antineutrino interactions in hydrogen obtained in a 138000-picture run
    at the BNL 7-ft bubble chamber. The antineutrino beam had an energy distribution that peaked at ∼1.1
    GeV. The cross section measured for charged-current interactions is σ(ν¯p→μ++anything)=(0.32±0.08)×10−38×[Eν¯ (GeV)]
    cm2. The neutral-current cross section is σ(ν¯p→ν¯pπ+π−)=5.5−2.6+4.4×10−40 cm2. The ratio of strangeness-changing
    to non-strangeness-changing charged currents is Rs=0.06−0.05+0.13. An upper limit determined for charm
    production is σc<3.8×10−40 cm2 at the 90% confidence level. From the momentum-transfer distribution
    we measure average Q2 for inelastic charged-current events with energy greater than 2 GeV, 〈Q2〉=(0.10±0.03)[Eν¯ (GeV)]+(0.10±0.09)
    (GeV/c)2. Using a maximum-likelihood method we determine from the quasielastic events ν¯p→μ+n an axial-vector
    mass MA=0.9−0.3+0.4 GeV/c2.
  added: '2026-06-16'
