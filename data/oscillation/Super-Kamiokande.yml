- bibtag: Super-Kamiokande:2023ahc
  title: Atmospheric neutrino oscillation analysis with neutron tagging and an expanded fiducial volume
    in Super-Kamiokande I–V
  collaboration: Super-Kamiokande
  arxiv: '2311.05105'
  doi: 10.1103/PhysRevD.109.072014
