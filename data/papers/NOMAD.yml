- bibtag: NOMAD:2001ozt
  title: Inclusive production of rho0(770), f(0)(980) and f(2)(1270) mesons in muon-neutrino charged current
    interactions
  collaboration: NOMAD
  arxiv: hep-ex/0103017
  doi: 10.1016/S0550-3213(01)00054-2
  journal: Nucl.Phys.B
  volume: '601'
  pages: '3'
  year: 2001
  published_date: 2001-03
  inspire_recid: 554060
  citation_count: 21
  abstract: The inclusive production of the meson resonances $\rho^{0}(770)$, $f_0(980)$ and $f_2(1270)$
    in neutrino-nucleus charged current interactions has been studied with the NOMAD detector exposed
    to the wide band neutrino beam generated by 450 GeV protons at the CERN SPS. For the first time the
    $f_{0}(980)$ meson is observed in neutrino interactions. The statistical significance of its observation
    is 6 standard deviations. The presence of $f_{2}(1270)$ in neutrino interactions is reliably established.
    The average multiplicity of these three resonances is measured as a function of several kinematic
    variables. The experimental results are compared to the multiplicities obtained from a simulation
    based on the Lund model. In addition, the average multiplicity of $\rho^{0}(770)$ in antineutrino
    - nucleus interactions is measured.
