- bibtag: Kitagaki:1986ct
  title: Charged Current Exclusive Pion Production in Neutrino Deuterium Interactions
  collaboration: BNL
  arxiv: null
  doi: 10.1103/PhysRevD.34.2554
  journal: Phys.Rev.D
  volume: '34'
  pages: '2554'
  year: 1986
  published_date: 1986-11
  inspire_recid: 238395
  citation_count: 329
  abstract: High-statistics data from two exposures of the BNL 7-foot deuterium bubble chamber to a wide-band-neutrino
    beam with an average energy of 1.6 GeV were analyzed for exclusive pion production in charged-current
    neutrino-deuterium interactions. For the single-pion production reactions, the properties of Δ++ production
    and decay as well as the final results of an isospin analysis are presented. New results for single-pion
    and multipion production are also presented.
