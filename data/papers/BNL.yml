- bibtag: Coteus:1981ub
  title: Measurement of Elastic Muon-neutrino and Anti-muon-neutrino Scattering on Protons
  collaboration: BNL
  arxiv: null
  doi: 10.1103/PhysRevD.24.1420
  journal: Phys.Rev.D
  volume: '24'
  pages: '1420'
  year: 1981
  published_date: '1981'
  inspire_recid: 171264
  citation_count: 15
  abstract: We have measured elastic νμ and ν¯μ scattering on protons at the Brookhaven National Laboratory
    Alternating Gradient Synchrotron. We find RNC=σ(ν¯μp→ν¯μp)σ(νμp→νμp)=0.44±0.12 and Rνμ=σ(νμp→νμp)σ(νμn→μ−p)=0.11±0.03.
    The elastic Q2 distribution is in good agreement with present knowledge of form factors and the Weinberg-Salam
    model. We find sin2θW=0.26±0.06.
