- bibtag: T2K:2017krm
  title: Updated T2K measurements of muon neutrino and antineutrino disappearance using 1.5$\times$10$^{21}$
    protons on target
  collaboration: T2K
  arxiv: '1704.06409'
  doi: 10.1103/PhysRevD.96.011102
  journal: Phys.Rev.D
  volume: '96'
  pages: '011102'
  year: 2017
  published_date: '2017-04-21'
  inspire_recid: 1593925
  citation_count: 60
  abstract: We report measurements by the T2K experiment of the parameters $\theta_{23}$ and $\Delta m^{2}_{32}$
    governing the disappearance of muon neutrinos and antineutrinos in the three flavor neutrino oscillation
    model. Utilizing the ability of the experiment to run with either a mainly neutrino or a mainly antineutrino
    beam, the parameters are measured separately for neutrinos and antineutrinos. Using $7.482 \times
    10^{20}$ POT in neutrino running mode and $7.471 \times 10^{20}$ POT in antineutrino mode, T2K obtained,
    $\sin^{2}(\theta_{23})=0.51^{+0.08}_{-0.07}$ and $\Delta m^{2}_{32} = 2.53^{+0.15}_{-0.13} \times
    10^{-3}$eV$^{2}$/c$^{4}$ for neutrinos, and $\sin^{2}({\overline{\theta}}_{23})=0.42^{+0.25}_{-0.07}$
    and ${\Delta\overline{m}^2}_{32} = 2.55^{+0.33}_{-0.27} \times 10^{-3}$eV$^{2}$/c$^{4}$ for antineutrinos
    (assuming normal mass ordering). No significant differences between the values of the parameters describing
    the disappearance of muon neutrinos and antineutrinos were observed.
