- bibtag: STEREO:2022nzk
  title: STEREO neutrino spectrum of $^{235}$U fission rejects sterile neutrino hypothesis
  collaboration: STEREO
  arxiv: '2210.07664'
  doi: 10.1038/s41586-022-05568-2
  journal: Nature
  volume: '613'
  pages: '257'
  year: 2023
  published_date: '2022-10-14'
  inspire_recid: 2165649
  citation_count: 91
  abstract: Anomalies in past neutrino measurements have led to the discovery that these particles have
    non-zero mass and oscillate between their three flavors when they propagate. In the 2010's, similar
    anomalies observed in the antineutrino spectra emitted by nuclear reactors have triggered the hypothesis
    of the existence of a supplementary neutrino state that would be sterile i.e. not interacting via
    the weak interaction. The STEREO experiment was designed to study this scientific case that would
    potentially extend the Standard Model of Particle Physics. Here we present a complete study based
    on our full set of data with significantly improved sensitivity. Installed at the ILL (Institut Laue
    Langevin) research reactor, STEREO has accurately measured the antineutrino energy spectrum associated
    to the fission of 235U. This measurement confirms the anomalies whereas, thanks to the segmentation
    of the STEREO detector and its very short mean distance to the core (10~m), the same data reject the
    hypothesis of a light sterile neutrino. Such a direct measurement of the antineutrino energy spectrum
    suggests instead that biases in the nuclear experimental data used for the predictions are at the
    origin of the anomalies. Our result supports the neutrino content of the Standard Model and establishes
    a new reference for the 235U antineutrino energy spectrum. We anticipate that this result will allow
    to progress towards finer tests of the fundamental properties of neutrinos but also to benchmark models
    and nuclear data of interest for reactor physics and for observations of astrophysical or geo-neutrinos.
