- bibtag: MicroBooNE:2021gfj
  title: Measurement of the flux-averaged inclusive charged-current electron neutrino and antineutrino
    cross section on argon using the NuMI beam and the MicroBooNE detector
  collaboration: MicroBooNE
  arxiv: '2101.04228'
  doi: 10.1103/PhysRevD.104.052002
