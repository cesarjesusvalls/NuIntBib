- bibtag: IceCube:2020tka
  title: Searching for eV-scale sterile neutrinos with eight years of atmospheric neutrinos at the IceCube
    Neutrino Telescope
  collaboration: IceCube
  arxiv: '2005.12943'
  doi: 10.1103/PhysRevD.102.052009
  journal: Phys.Rev.D
  volume: '102'
  pages: 052009
  year: 2020
  published_date: '2020-05-26'
  inspire_recid: 1798037
  citation_count: 103
  abstract: 'We report in detail on searches for eV-scale sterile neutrinos, in the context of a 3+1 model,
    using eight years of data from the IceCube neutrino telescope. By analyzing the reconstructed energies
    and zenith angles of 305,735 atmospheric $\nu_\mu$ and $\bar{\nu}_\mu$ events we construct confidence
    intervals in two analysis spaces: $\sin^2 (2\theta_{24})$ vs. $\Delta m^2_{41}$ under the conservative
    assumption $\theta_{34}=0$; and $\sin^2(2\theta_{24})$ vs. $\sin^2 (2\theta_{34})$ given sufficiently
    large $\Delta m^2_{41}$ that fast oscillation features are unresolvable. Detailed discussions of the
    event selection, systematic uncertainties, and fitting procedures are presented. No strong evidence
    for sterile neutrinos is found, and the best-fit likelihood is consistent with the no sterile neutrino
    hypothesis with a p-value of 8\% in the first analysis space and 19\% in the second.'
