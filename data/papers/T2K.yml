  inspire_recid: 2646102
  citation_count: 29
  abstract: This paper reports the first measurement of muon neutrino charged-current interactions without
    pions in the final state using multiple detectors with correlated energy spectra at T2K. The data
    was collected on hydrocarbon targets using the off-axis T2K near detector (ND280) and the on-axis
    T2K near detector (INGRID) with neutrino energy spectra peaked at 0.6 GeV and 1.1 GeV respectively.
    The correlated neutrino flux presents an opportunity to reduce the impact of the flux uncertainty
    and to study the energy dependence of neutrino interactions. The extracted double-differential cross
    sections are compared to several Monte Carlo neutrino-nucleus interaction event generators showing
    the agreement between both detectors individually and with the correlated result.
