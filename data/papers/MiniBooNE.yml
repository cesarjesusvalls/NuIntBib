  abstract: We report the measurement of the flux-averaged antineutrino neutral current elastic scattering
    cross section ($d\sigma_{\bar \nu N \rightarrow \bar \nu N}/dQ^{2}$) on CH$_{2}$ by the MiniBooNE
    experiment using the largest sample of antineutrino neutral current elastic candidate events ever
    collected. The ratio of the antineutrino to neutrino neutral current elastic scattering cross sections
    and a ratio of antineutrino neutral current elastic to antineutrino charged current quasi elastic
    cross section is also presented.
