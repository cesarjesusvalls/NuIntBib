  abstract: We report on a measurement of coherent single charged pion production in neutrino-nucleus
    scattering. The analysis is based on data taken with the CHARM II detector in beams of muon-neutrinos
    and -antineutrinos. The event numbers amount to N ( μ − π ) = 748 and N ( μ + π ) = 631. Cross sections
    and their dependence on the neutrino energy are determined. The results are in agreement with the
    predictions of models based on the PCAC hypothesis.
