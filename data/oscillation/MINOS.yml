- bibtag: MINOS:2007aa
  title: Preliminary Results from MINOS on Muon Neutrino Disappearance Based on an Exposure of 2.5 x $10^{20}$
    120-GeV Protons on the NuMI Target
  collaboration: MINOS
  arxiv: '0708.1495'
  doi: null
  journal: null
