  year: 2013
  published_date: '2013-05-09'
  inspire_recid: 1232963
  citation_count: 291
  abstract: We report a study of muon neutrino charged-current quasi-elastic events in the segmented scintillator
    inner tracker of the MINERvA experiment running in the NuMI neutrino beam at Fermilab. The events
    were selected by requiring a {\mu}^- and low calorimetric recoil energy separated from the interaction
    vertex. We measure the flux-averaged differential cross-section, d{\sigma}/dQ^2, and study the low
    energy particle content of the final state. Deviations are found between the measured d{\sigma}/dQ^2
    and the expectations of a model of independent nucleons in a relativistic Fermi gas. We also observe
    an excess of energy near the vertex consistent with multiple protons in the final state.
