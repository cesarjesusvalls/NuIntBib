- bibtag: RENO:2019otc
  title: Observation of reactor antineutrino disappearance using delayed neutron capture on hydrogen at
    RENO
  collaboration: RENO
  arxiv: '1911.04601'
  doi: 10.1007/JHEP04(2020)029
  journal: JHEP
  volume: '04'
  pages: 029
  year: 2020
  published_date: '2019-11-11'
  inspire_recid: 1764340
  citation_count: 32
  abstract: The Reactor Experiment for Neutrino Oscillation (RENO) experiment has been taking data using
    two identical liquid scintillator detectors of 44.5 tons since August 2011. The experiment has observed
    the disappearance of reactor neutrinos in their interactions with free protons, followed by neutron
    capture on hydrogen. Based on 1500 live days of data taken with 16.8 GW$_{th}$ reactors at the Hanbit
    Nuclear Power Plant in Korea, the near (far) detector observes 567690 (90747) electron antineutrino
    candidate events with a delayed neutron capture on hydrogen. This provides an independent measurement
    of $\theta_{13}$ and a consistency check on the validity of the result from n-Gd data. Furthermore,
    it provides an important cross-check on the systematic uncertainties of the n-Gd measurement. Based
    on a rate-only analysis, we obtain sin$^{2}$2$\theta _{13}$= 0.087 $\pm$ 0.008 (stat.) $\pm$ 0.014
    (syst.).
