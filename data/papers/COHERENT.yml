  journal: Phys.Rev.Lett.
  volume: '134'
  pages: '231801'
  year: 2025
  published_date: '2024-06-19'
  inspire_recid: 2800533
  citation_count: 94
  abstract: We report the first detection of coherent elastic neutrino-nucleus scattering (CEvNS) on natural
    germanium, measured at the Spallation Neutron Source at Oak Ridge National Laboratory. The Ge-Mini
    detector of the COHERENT collaboration employs large-mass, low-noise, high-purity germanium spectrometers,
    enabling excellent energy resolution, and an analysis threshold of 1.5 keV electron-equivalent ionization
    energy. We observe a on-beam excess of 20.6 +7.1 -6.3 counts with a total exposure of 10.22 GWhkg
    and we reject the no-CEvNS hypothesis with 3.9 sigma significance. The result agrees with the predicted
    standard model of particle physics signal rate within 2 sigma.
  added: '2026-06-16'
