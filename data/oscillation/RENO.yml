    display="inline"><mrow><mo stretchy="false">|</mo><mi mathvariant="normal">Δ</mi><msubsup><mrow><mi>m</mi></mrow><mrow><mi>e</mi><mi>e</mi></mrow><mrow><mn>2</mn></mrow></msubsup><mo
