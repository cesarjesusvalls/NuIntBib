- bibtag: DayaBay:2015ayh
  title: New Measurement of Antineutrino Oscillation with the Full Detector Configuration at Daya Bay
  collaboration: Daya Bay
  arxiv: '1505.03456'
  doi: 10.1103/PhysRevLett.115.111802
