  citation_count: 7
  abstract: This MINERvA analysis is the first neutrino and antineutrino study of a shallow inelastic
    scattering region, which is the transition region between resonant production and deep inelastic scattering
    processes. This transition is explicitly included in this study by expanding the scope of shallow
    inelastic scattering to include not only the mainly lower-$Q^2$ nonresonant pion production but also
    the kinematic region where pion production off quarks within the nucleon becomes significant with
    $Q^2$ below the onset of the deep-inelastic scattering region defined in this analysis. To reduce
    the resonance background the kinematic region 1.5 $<$$W$$<$ 2 GeV/$c^2$ was chosen. In addition to
    the inclusive differential cross section measurements, to emphasize SIS interactions off quarks within
    the nucleon a sample with $Q^2$$\geq$ 1 GeV/$c^2$ was also analyzed. The measurements of one-dimensional
    cross sections at $\left\langle E_\nu \right\rangle \sim 6$ GeV on hydrocarbon of $Q^2$, Bjorken x
    and muon momentum variables are compared with modified predictions from the GENIE 2 neutrino generator
    as well as predictions of other neutrino simulators GiBUU, NEUT, NuWro and an alternative GENIE 3
    version. Significant discrepancies both in shape and magnitude between measurements and neutrino simulator
    predictions of all variables have been observed.
