- bibtag: Derrick:1980nr
  title: Study of the Reaction Neutrino $N \to$ Neutrino $p \pi^-$
  collaboration: ANL
  arxiv: null
  doi: 10.1016/0370-2693(80)90283-X
  journal: Phys.Lett.B
  volume: '92'
  pages: '363'
  year: 1980
  published_date: 1980-02
  inspire_recid: 8885
  citation_count: 47
  abstract: We have measured the excitation function for the neutral current process νn → νpπ − as a function
    of neutrino energy. Our data give a cross section ratio R = σ ( ν p π − )/ σ ( μ − p π + )=0.11±0.022
    over the energy interval (0.3⩽ E ν ⩽1.5)GeV. This measurement of single-pion production in a kinematically
    defined reaction is the first to use a deuterium target. The R value, as well as other characteristics
    of the data, agrees with the Adler model for single-pion production via the neutral current and gives
    a value of sin 2 θ w =0.26±0.09.
