- bibtag: STEREO:2018rfh
  title: Sterile Neutrino Constraints from the STEREO Experiment with 66 Days of Reactor-On Data
  collaboration: STEREO
  arxiv: '1806.02096'
  doi: 10.1103/PhysRevLett.121.161801
  journal: Phys.Rev.Lett.
  volume: '121'
  pages: '161801'
  year: 2018
  published_date: '2018-06-06'
  inspire_recid: 1676545
  citation_count: 133
  abstract: The reactor antineutrino anomaly might be explained by the oscillation of reactor antineutrinos
    toward a sterile neutrino of eV mass. In order to explore this hypothesis, the STEREO experiment measures
    the antineutrino energy spectrum in six different detector cells covering baselines between 9 and
    11 m from the compact core of the ILL research reactor. In this Letter, results from 66 days of reactor
    turned on and 138 days of reactor turned off are reported. A novel method to extract the antineutrino
    rates has been developed based on the distribution of the pulse shape discrimination parameter. The
    test of a new oscillation toward a sterile neutrino is performed by comparing ratios of cells, independent
    of absolute normalization and of the prediction of the reactor spectrum. The results are found to
    be compatible with the null oscillation hypothesis and the best fit of the reactor antineutrino anomaly
    is excluded at 97.5\% C.L.
