- bibtag: Super-Kamiokande:2013mie
  title: First Indication of Terrestrial Matter Effects on Solar Neutrino Oscillation
  collaboration: Super-Kamiokande
  arxiv: '1312.5176'
  doi: 10.1103/PhysRevLett.112.091805
  journal: Phys.Rev.Lett.
  volume: '112'
  pages: 091805
  year: 2014
  published_date: '2013-12-18'
  inspire_recid: 1272683
  citation_count: 147
  abstract: We report an indication that the elastic scattering rate of solar $^8$B neutrinos with electrons
    in the Super-Kamiokande detector is larger when the neutrinos pass through the Earth during nighttime.
    We determine the day/night asymmetry, defined as the difference of the average day rate and average
    night rate divided by the average of those two rates, to be $(-3.2\pm1.1(\text{stat})\pm0.5(\text{syst}))\%$,
    which deviates from zero by 2.7 $\sigma$. Since the elastic scattering process is mostly sensitive
    to electron-flavored solar neutrinos, a non-zero day/night asymmetry implies that the flavor oscillations
    of solar neutrinos are affected by the presence of matter within the neutrinos' flight path. Super-Kamiokande's
    day/night asymmetry is consistent with neutrino oscillations for $4\times10^{-5}$eV$^2\leq\Delta m^2_{21}\leq7\times10^{-5}$eV$^2$
    and large mixing values of $\theta_{12}$, at the $68\%$ C.L.
