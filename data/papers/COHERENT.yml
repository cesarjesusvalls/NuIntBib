- bibtag: COHERENT:2017ipa
  title: Observation of Coherent Elastic Neutrino-Nucleus Scattering
  collaboration: COHERENT
  arxiv: '1708.01294'
  doi: 10.1126/science.aao0990
  journal: Science
  volume: '357'
  pages: '1123'
  year: 2017
  published_date: '2017-08-03'
  inspire_recid: 1614476
  citation_count: 979
  abstract: The coherent elastic scattering of neutrinos off nuclei has eluded detection for four decades,
    even though its predicted cross-section is the largest by far of all low-energy neutrino couplings.
    This mode of interaction provides new opportunities to study neutrino properties, and leads to a miniaturization
    of detector size, with potential technological applications. We observe this process at a 6.7-sigma
    confidence level, using a low-background, 14.6-kg CsI[Na] scintillator exposed to the neutrino emissions
    from the Spallation Neutron Source (SNS) at Oak Ridge National Laboratory. Characteristic signatures
    in energy and time, predicted by the Standard Model for this process, are observed in high signal-to-background
    conditions. Improved constraints on non-standard neutrino interactions with quarks are derived from
    this initial dataset.
  added: '2026-06-16'
