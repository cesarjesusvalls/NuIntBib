- bibtag: Super-Kamiokande:2010tar
  title: Solar neutrino results in Super-Kamiokande-III
  collaboration: Super-Kamiokande
  arxiv: '1010.0118'
  doi: 10.1103/PhysRevD.83.052010
  journal: Phys.Rev.D
  volume: '83'
  pages: '052010'
