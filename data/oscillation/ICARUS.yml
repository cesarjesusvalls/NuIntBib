- bibtag: ICARUS:2013cwr
  title: Search for anomalies in the ${\nu}_e$ appearance from a ${\nu}_{\mu}$ beam
  collaboration: ICARUS
  arxiv: '1307.4699'
  doi: 10.1140/epjc/s10052-013-2599-z
  journal: Eur.Phys.J.C
  volume: '73'
  pages: '2599'
  year: 2013
  published_date: '2013-07-17'
  inspire_recid: 1243162
  citation_count: 142
  abstract: We report an updated result from the ICARUS experiment on the search for {\nu}{\mu} ->{\nu}e
    anomalies with the CNGS beam, produced at CERN with an average energy of 20 GeV and travelling 730
    km to the Gran Sasso Laboratory. The present analysis is based on a total sample of 1995 events of
    CNGS neutrino interactions, which corresponds to an almost doubled sample with respect to the previously
    published result. Four clear {\nu}e events have been visually identified over the full sample, compared
    with an expectation of 6.4 +- 0.9 events from conventional sources. The result is compatible with
    the absence of additional anomalous contributions. At 90% and 99% confidence levels the limits to
    possible oscillated events are 3.7 and 8.3 respectively. The corresponding limit to oscillation probability
    becomes consequently 3.4 x 10-3 and 7.6 x 10-3 respectively. The present result confirms, with an
    improved sensitivity, the early result already published by the ICARUS collaboration.
