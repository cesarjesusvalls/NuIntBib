  inspire_recid: 2966820
  citation_count: 5
  abstract: We present flux-averaged charged-current $ν_μ$ cross-section measurements on argon for final
    states containing exactly one $π^\pm$ and no other hadrons except nucleons. The analysis uses data
    from the MicroBooNE experiment in the Booster Neutrino Beam, corresponding to $1.11 \times 10^{21}$
    protons on target. Total and single-differential cross-section measurements are provided within a
    phase space restricted to muon momenta above 150 MeV, pion momenta above 100 MeV, and muon-pion opening
    angles smaller than 2.65 rad. Differential cross sections are reported with respect to the scattering
    angles of the muon and pion relative to the beam direction, their momenta, and their combined opening
    angle. The differential cross section with respect to muon momentum is based on a subset of selected
    events with the muon track fully contained in the detector, whereas the cross section with respect
    to pion momentum is based on a subset of selected events rich in pions that have not hadronically
    scattered on the argon before coming to rest. The latter has not been measured on argon before. The
    total cross section is measured as $(3.75~\pm~0.07~\textrm{(stat.)}~\pm~0.80~\textrm{(syst.)}) \times
    10^{-38} \, \text{cm}^2/\text{Ar}$ at a mean energy of approximately 0.8 GeV. Comparisons of the measured
    cross sections with predictions from multiple neutrino-nucleus interaction generators show good overall
    agreement, except at very forward muon angles.
