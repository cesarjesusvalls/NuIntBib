- bibtag: NOvA:2025tmb
  title: Precision Measurement of Neutrino Oscillation Parameters with 10 Years of Data from the NOvA
    Experiment
  collaboration: NOvA
  arxiv: '2509.04361'
  doi: 10.1103/x53y-2b86
  journal: Phys.Rev.Lett.
  volume: '136'
  pages: 011802
  year: 2026
  published_date: '2025-09-04'
  inspire_recid: 2966613
  citation_count: 27
  abstract: This Letter reports measurements of muon-neutrino disappearance and electron-neutrino appearance
    and the corresponding antineutrino processes between the two NOvA detectors in the NuMI neutrino beam.
    These measurements use a dataset with double the neutrino mode beam exposure that was previously analyzed,
    along with improved simulation and analysis techniques. A joint fit to these samples in the three-flavor
    paradigm results in the most precise single-experiment constraint on the atmospheric neutrino mass
    splitting, $Δm^2_{32}= 2.431^{+0.036}_{-0.034} (-2.479^{+0.036}_{-0.036}) \times 10^{-3}~\mathrm{eV}^2$
    if the mass ordering is normal (inverted). In both orderings, a region close to maximal mixing with
    $\sin^2 θ_{23}=0.55^{+0.02}_{-0.06}$ is preferred. The NOvA data show a mild preference for the normal
    mass ordering with a Bayes factor of 2.4 (corresponding to 70% of the posterior probability), indicating
    that the normal ordering is 2.4 times more probable than the inverted ordering. When incorporating
    a 2D $Δm^2_{32}\text{--}\sin^2 2θ_{13}$ constraint based on Daya Bay data, this preference strengthens
    to a Bayes factor of 6.6 (87%).
