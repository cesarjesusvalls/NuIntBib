  volume: '123'
  pages: '151803'
  year: 2019
  published_date: '2019-06-11'
  inspire_recid: 1739571
  citation_count: 457
  abstract: The NOvA experiment has made a $4.4\sigma$-significant observation of $\bar\nu_{e}$ appearance
    in a 2 GeV $\bar\nu_{\mu}$ beam at a distance of 810 km. Using $12.33\times10^{20}$ protons on target
    delivered to the Fermilab NuMI neutrino beamline, the experiment recorded 27 $\bar\nu_{\mu} \rightarrow
    \bar\nu_{e}$ candidates with a background of 10.3 and 102 $\bar\nu_{\mu} \rightarrow \bar\nu_{\mu}$
    candidates. This new antineutrino data is combined with neutrino data to measure the oscillation parameters
    $|\Delta m^2_{32}| = 2.48^{+0.11}_{-0.06}\times10^{-3}$ eV$^2/c^4$, $\sin^2 \theta_{23} = 0.56^{+0.04}_{-0.03}$
    in the normal neutrino mass hierarchy and upper octant and excludes most values near $\delta_{\rm
    CP}=\pi/2$ for the inverted mass hierarchy by more than 3$\sigma$. The data favor the normal neutrino
    mass hierarchy by 1.9$\sigma$ and $\theta_{23}$ values in the upper octant by 1.6$\sigma$.
