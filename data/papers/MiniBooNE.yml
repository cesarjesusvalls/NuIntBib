- bibtag: MiniBooNE:2010xqw
  title: Measurement of the Neutrino Neutral-Current Elastic Differential Cross Section on Mineral Oil
    at $E_\nu \sim 1$ GeV
  collaboration: MiniBooNE
  arxiv: '1007.4730'
  doi: 10.1103/PhysRevD.82.092005
  journal: Phys.Rev.D
  volume: '82'
  pages: 092005
  year: 2010
  published_date: 2010-07
  inspire_recid: 863070
  citation_count: 237
  abstract: We report a measurement of the flux-averaged neutral-current elastic differential cross section
    for neutrinos scattering on mineral oil (CH$_2$) as a function of four-momentum transferred squared.
    It is obtained by measuring the kinematics of recoiling nucleons with kinetic energy greater than
    50~MeV which are readily detected in MiniBooNE. This differential cross-section distribution is fit
    with fixed nucleon form factors apart from an axial mass, $M_{A}$, that provides a best fit for $M_A=
    1.39\pm0.11$~GeV. Additionally, single protons with kinetic energies above 350 MeV can be distinguished
    from neutrons and multiple nucleon events. Using this marker, the strange quark contribution to the
    neutral-current axial vector form factor at $Q^2 = 0$, $\Delta s$, is found to be $\Delta s=0.08\pm0.26$.
  added: '2024-12-09'
