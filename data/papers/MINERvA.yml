- bibtag: MINERvA:2014rdw
  title: Measurement of Ratios of $\nu_{\mu}$ Charged-Current Cross Sections on C, Fe, and Pb to CH at
    Neutrino Energies 2-20 GeV
  collaboration: MINERvA
  arxiv: '1403.2103'
  doi: 10.1103/PhysRevLett.112.231801
  journal: Phys.Rev.Lett.
  volume: '112'
  pages: '231801'
  year: 2014
  published_date: '2014-03-09'
  inspire_recid: 1285224
  citation_count: 93
  abstract: We present measurements of $\nu_{\mu}$ charged-current cross section ratios on carbon, iron,
    and lead relative to a scintillator (CH) using the fine-grained MINERvA detector exposed to the NuMI
    neutrino beam at Fermilab. The measurements utilize events of energies $2<E_{\nu}<20~GeV$, with $\left<
    E_{\nu}\right>=8~GeV$, which have a reconstructed $\mu^{-}$ scattering angle less than $17^\circ$
    to extract ratios of inclusive total cross sections as a function of neutrino energy $E_{\nu}$ and
    flux-integrated differential cross sections with respect to the Bjorken scaling variable $x$. These
    results provide the first high-statistics direct measurements of nuclear effects in neutrino scattering
    using different targets in the same neutrino beam. Measured cross section ratios exhibit a relative
    depletion at low $x$ and enhancement at large $x$. Both become more pronounced as the nucleon number
    of the target nucleus increases. The data are not reproduced by GENIE, a conventional neutrino-nucleus
    scattering simulation, or by the alternative models for the nuclear dependence of inelastic scattering
    that are considered.
