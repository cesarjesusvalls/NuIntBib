  citation_count: 7
  abstract: The first simultaneous measurements of the $ν_μ$ quasielastic-like cross section on C, CH,
    H$_2$0, Fe, and Pb targets as a function of kinematic imbalance variables in the plane transverse
    to the incoming neutrino direction are presented. These variables combine the muon and proton information
    to provide a new way to disentangle the effects of the nucleus in quasielastic-like processes. The
    data were obtained using a wide-band $ν_μ$ beam with $<$E$_ν>\sim$6 GeV. Cross-section ratios of the
    different target materials to CH are also shown. These measurements are used to explore the nature
    of the cross-section $A$-scaling, as well as initial and final state interaction effects. Comparisons
    are made to predictions from a number of commonly used neutrino Monte Carlo event generators. The
    range of predictions of the different models tends to cover the data but the degree and consistency
    of the agreement suffers in regions, and on higher $A$ targets, where the final state interactions
    are expected to be more pronounced.
