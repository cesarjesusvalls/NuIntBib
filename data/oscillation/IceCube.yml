- bibtag: IceCube:2019dyb
  title: Development of an analysis to probe the neutrino mass ordering with atmospheric neutrinos using
    three years of IceCube DeepCore data
  collaboration: IceCube
  arxiv: '1902.07771'
  doi: 10.1140/epjc/s10052-019-7555-0
  journal: Eur.Phys.J.C
  volume: '80'
  pages: '9'
  year: 2020
  published_date: '2019-02-20'
  inspire_recid: 1721422
  citation_count: 55
  abstract: The Neutrino Mass Ordering (NMO) remains one of the outstanding questions in the field of
    neutrino physics. One strategy to measure the NMO is to observe matter effects in the oscillation
    pattern of atmospheric neutrinos above $\sim 1\,\mathrm{GeV}$, as proposed for several next-generation
    neutrino experiments. Moreover, the existing IceCube DeepCore detector can already explore this type
    of measurement. We present results of a first search for the signature of the NMO with three years
    of DeepCore data based on two independent analyses. These analyses include a full treatment of systematic
    uncertainties and a statistically-rigorous method to determine the significance for the NMO from a
    fit to the data. For the more sensitive analysis, we observe a preference for Normal Ordering with
    a $p$-value of $p_\mathrm{IO} = 15.3\%$ and $\mathrm{CL}_\mathrm{s}=53.3\%$ for the Inverted Ordering
    hypothesis, while the experimental results from both analyses are consistent within their uncertainties.
    Since the result is independent of the value of $\delta_\mathrm{CP}$ and obtained from energies $E_\nu
    \gtrsim 5\,\mathrm{GeV}$, it is complementary to recent results from long-baseline experiments. These
    analyses set the groundwork for the future of this measurement with more capable detectors, such as
    the IceCube Upgrade and the proposed PINGU detector.
