- bibtag: Super-Kamiokande:2014exs
  title: Test of Lorentz invariance with atmospheric neutrinos
  collaboration: Super-Kamiokande
  arxiv: '1410.4267'
  doi: 10.1103/PhysRevD.91.052003
  journal: Phys.Rev.D
  volume: '91'
  pages: '052003'
  year: 2015
  published_date: '2014-10-15'
  inspire_recid: 1322564
  citation_count: 129
  abstract: A search for neutrino oscillations induced by Lorentz violation has been performed using 4,438
    live-days of Super-Kamiokande atmospheric neutrino data. The Lorentz violation is included in addition
    to standard three-flavor oscillations using the non-perturbative Standard Model Extension (SME), allowing
    the use of the full range of neutrino path lengths, ranging from 15 to 12,800 km, and energies ranging
    from 100 MeV to more than 100 TeV in the search. No evidence of Lorentz violation was observed, so
    limits are set on the renormalizable isotropic SME coefficients in the $e\mu$, $\mu\tau$, and $e\tau$
    sectors, improving the existing limits by up to seven orders of magnitude and setting limits for the
    first time in the neutrino $\mu\tau$ sector of the SME.
