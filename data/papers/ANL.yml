- bibtag: Campbell:1973wg
  title: Study of the reaction nu p ---> mu- pi+ p
  collaboration: ANL
  arxiv: null
  doi: 10.1103/PhysRevLett.30.335
  journal: Phys.Rev.Lett.
  volume: '30'
  pages: '335'
  year: 1973
  published_date: '1973'
  inspire_recid: 84537
  citation_count: 140
  abstract: We present an analysis of 153 events of the reaction νp→μ−π+p at an average neutrino energy
    of 1 GeV. The results were obtained using the Argonne 12-ft hydrogen bubble chamber. The reaction
    is dominated by μ−Δ++(1236) production for which the total cross section rises from threshold to a
    value of (0.74±0.18)×10−38 cm2 at Eν≳1.0 GeV. The production and decay angular distributions of the
    Δ++ are given. There is no evidence for hadron-lepton mass enhancements.
