    stretchy="false">¯</mo></mover><mi>e</mi></msub></math>) oscillations at the Hanbit nuclear power
    plant, Younggwang, Korea, since August 2011. As of March 2023, the data acquisition was completed
    after a total of 3800 live days of detector operation. The observed candidates via inverse beta decay
    with the neutron capture on the gadolinium channel are 1,211,995 (144,667) in the near (far) detector.
    Based on an observed energy-dependent reactor neutrino disappearance, neutrino oscillation parameters
    of <math display="inline"><msub><mi>θ</mi><mn>13</mn></msub></math> and <math display="inline"><mo
