- bibtag: IceCube:2024pky
  title: Exploration of mass splitting and muon/tau mixing parameters for an eV-scale sterile neutrino
    with IceCube
  collaboration: IceCube
  arxiv: '2406.00905'
  doi: 10.1016/j.physletb.2024.139077
  journal: Phys.Lett.B
  volume: '858'
  pages: '139077'
  year: 2024
  published_date: '2024-06-02'
  inspire_recid: 2793702
  citation_count: 12
  abstract: 'We present the first three-parameter fit to a 3+1 sterile neutrino model using 7.634 years
    of data from the IceCube Neutrino Observatory on $\nu_\mu+\overline{\nu}_\mu$ charged-current interactions
    in the energy range 500--9976 GeV. Our analysis is sensitive to the mass-squared splitting between
    the heaviest and lightest mass state ($\Delta m_{41}^2$), the mixing matrix element connecting muon
    flavor to the fourth mass state ($|U_{\mu4}|^2$), and the element connecting tau flavor to the fourth
    mass state ($|U_{\tau4}|^2$). Predicted propagation effects in matter enhance the signature through
    a resonance as atmospheric neutrinos from the Northern Hemisphere traverse the Earth to the IceCube
    detector at the South Pole. The remaining sterile neutrino matrix elements are left fixed, with $|U_{e4}|^2=
    0$ and $\delta_{14}=0$, as they have a negligible effect, and $\delta_{24}=\pi$ is set to give the
    most conservative limits. The result is consistent with the no-sterile neutrino hypothesis with a
    probability of 4.3%. Profiling the likelihood of each parameter yields the 90\% confidence levels:
    $ 2.4\,\mathrm{eV}^{2} < \Delta m_{41}^2 <9.6\,\mathrm{eV}^{2} $ , $0.0081 < |U_{\mu4}|^2 < 0.10$
    , and $|U_{\tau4}|^2< 0.035$, which narrows the allowed parameter-space for $|U_{\tau4}|^2$. However,
    the primary result of this analysis is the first map of the 3+1 parameter space exploring the interdependence
    of $\Delta m_{41}^2$, $|U_{\mu4}|^2$, and $|U_{\tau4}|^2$.'
  added: '2026-06-21'
