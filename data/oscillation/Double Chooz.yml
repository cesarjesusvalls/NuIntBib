- bibtag: DoubleChooz:2011ymz
  title: Indication of Reactor $\bar{\nu}_e$ Disappearance in the Double Chooz Experiment
  collaboration: Double Chooz
  arxiv: '1112.6353'
  doi: 10.1103/PhysRevLett.108.131801
  journal: Phys.Rev.Lett.
  volume: '108'
  pages: '131801'
  year: 2012
  published_date: 2011-12
  inspire_recid: 1082938
  citation_count: 1805
  abstract: The Double Chooz Experiment presents an indication of reactor electron antineutrino disappearance
    consistent with neutrino oscillations. A ratio of 0.944 $\pm$ 0.016 (stat) $\pm$ 0.040 (syst) observed
    to predicted events was obtained in 101 days of running at the Chooz Nuclear Power Plant in France,
    with two 4.25 GW$_{th}$ reactors. The results were obtained from a single 10 m$^3$ fiducial volume
    detector located 1050 m from the two reactor cores. The reactor antineutrino flux prediction used
    the Bugey4 measurement as an anchor point. The deficit can be interpreted as an indication of a non-zero
    value of the still unmeasured neutrino mixing parameter \sang. Analyzing both the rate of the prompt
    positrons and their energy spectrum we find \sang = 0.086 $\pm$ 0.041 (stat) $\pm$ 0.030 (syst), or,
    at 90% CL, 0.015 $<$ \sang $\ <$ 0.16.
