  abstract: The cross sections of neutrino and antineutrino quasielastic reactions\(vn \to \mu ^ -p,\bar
    vp \to \mu ^ +n,\bar vp \to \mu ^ +\Lambda\) were studied in the neutrino energy range between 3 and
    30 GeV. In comparison withV-A theory axial mass parameters ofMA=(1.06±0.05±0.14) GeV/c2 from neutrino
    andMA=(0.71±0.10±0.20) GeV/c2 from antineutrino data were found. The total cross-section for the hyperon
    production process can be described byMA=1.0 GeV/c2.
