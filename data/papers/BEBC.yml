  abstract: An analysis has been performed of neutrino and antineutrino interactions with protons and
    neutrons in a deuterium bubble chamber. The interactions under study are quasielastic neutrino-neutron
    scattering and one-, two- and three-pion production reactions. Results are presented on cross sections,
    effective mass distributions, resonance production, momentum transfer distributions and coefficients
    of the decay angular distributions. Where possible, comparisons are made with existing theoretical
    models and predictions.
