  abstract: We present a search for non-zero theta_{13} and deviations of sin^2 theta_{23} from 0.5 in
    the oscillations of atmospheric neutrino data from Super-Kamiokande -I, -II, and -III. No distortions
    of the neutrino flux consistent with non-zero theta_{13} are found and both neutrino mass hierarchy
    hypotheses are in agreement with the data. The data are best fit at Delta m^2 = 2.1 x 10^-3 eV^2,
