- bibtag: KM3NeT:2026kuj
  title: Atmospheric neutrino constraints on Lorentz invariance violation with the first six detection
    units of KM3NeT/ORCA
  collaboration: KM3NeT
  arxiv: '2603.04264'
  doi: null
  journal: null
  volume: null
  pages: null
  year: 2026
  published_date: '2026-03-04'
  inspire_recid: 3125675
  citation_count: 1
  abstract: Lorentz invariance is a fundamental symmetry underlying both the Standard Model of particle
    physics and General Relativity. Testing its validity provides a direct means of searching for new
    physics emerging near the Planck scale. A search for isotropic Lorentz invariance violation with 1.4
    years of atmospheric neutrino data collected by a partial configuration of the KM3NeT/ORCA detector
    comprising six detection units is presented. No evidence for such violation is found; thus, competitive
    limits are set on a subset of isotropic Lorentz invariance violating coefficients, which complement
    and extend existing experimental constraints.
