  title: Comparisons of triple-differential cross sections for quasielastic-like $ν_μ$-hydrocarbon interactions
    using $\langle E_ν\rangle \sim$ 3~GeV versus $\sim$ 6~GeV beams in MINERvA
  collaboration: MINERvA
