- bibtag: MicroBooNE:2022ubh
  title: $\nu_mu$ Disappearance in MicroBooNE using the Deep Learning 1$\mu$1$p$ Selection
  collaboration: MicroBooNE
  arxiv: null
  doi: 10.2172/2406202
  journal: null
  volume: null
  pages: null
  year: 2022
  published_date: '2022-05-30'
  inspire_recid: 2806724
  citation_count: 0
  abstract: We test a 3+1 model with the MicroBooNE data using a 1µ1p selection developed using Deep-Learning-based
    reconstruction. In order to test this model we apply a muon neutrino disappearance effect to the selection,
    and search across a grid of oscillation model parameters using a Feldman Cousins technique. We determine
    MicroBooNE’s sensitivity across this model parameter space, and perform several validation studies
    to test this study’s robustness. Finally, we examine the allowed and excluded regions per MicroBooNE’s
    data at 90% confidence, using a data set corresponding to 6.67 × 1020 protons on target. The null
    model remains allowed, and several of the high-disappearance models are excluded.
