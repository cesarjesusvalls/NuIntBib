- bibtag: MINOS:2008ccf
  title: Search for active neutrino disappearance using neutral-current interactions in the MINOS long-baseline
    experiment
  collaboration: MINOS
  arxiv: '0807.2424'
  doi: 10.1103/PhysRevLett.101.221804
  journal: Phys.Rev.Lett.
  volume: '101'
  pages: '221804'
  year: 2008
  published_date: 2008-07
  inspire_recid: 790795
  citation_count: 89
  abstract: We have measured the rates and spectra of neutral-current neutrino interactions in the MINOS
    detectors, which are separated by 734 km. A depletion in the rate at the far site would indicate mixing
    between muon neutrinos and a sterile particle. The depletion of the total neutral-current event rate
    at the far site is limited to be below 17% at 90% confidence level without electron neutrino appearance.
    Assuming oscillations occur at a single mass-squared splitting, a fit to the neutral- and charged-current
    energy spectra shows the fraction of muon neutrinos oscillating to a sterile neutino is 0.28^{+0.25}_{-0.28}
    (stat.+syst.). Including electron neutrino appearance at the current experimental upper bound limits
    the depletion to be below 21% at 90% confidence level and the fit fraction of muon neutrinos oscillating
    to a sterile neutrino is 0.43^{+0.23}_{-0.27} (stat.+syst.).
