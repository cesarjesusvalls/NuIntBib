- bibtag: DoubleChooz:2020pnv
  title: Search for signatures of sterile neutrinos with Double Chooz
  collaboration: Double Chooz
  arxiv: '2009.05515'
  doi: 10.1140/epjc/s10052-021-09459-0
  journal: Eur.Phys.J.C
  volume: '81'
  pages: '775'
  year: 2021
  published_date: '2020-09-11'
  inspire_recid: 1816683
  citation_count: 28
  abstract: We present a search for signatures of neutrino mixing of electron anti-neutrinos with additional
    hypothetical sterile neutrino flavors using the Double Chooz experiment. The search is based on data
    from 5 years of operation of Double Chooz, including 2 years in the two-detector configuration. The
    analysis is based on a profile likelihood, i.e. comparing the data to the model prediction of disappearance
    in a data-to-data comparison of the two respective detectors. The analysis is optimized for a model
    of three active and one sterile neutrino. It is sensitive in the typical mass range $5 \cdot 10^{-3}
    $ eV$^2 \lesssim \Delta m^2_{41} \lesssim 3\cdot 10^{-1} $ eV$^2$ for mixing angles down to $\sin^2
    2\theta_{14} \gtrsim 0.02$. No significant disappearance additionally to the conventional disappearance
    related to $\theta_{13} $ is observed and correspondingly exclusion bounds on the sterile mixing parameter
    $\theta_{14} $ as function of $ \Delta m^2_{41} $ are obtained.
