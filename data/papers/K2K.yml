    measurement_type: ratio
    observables: ratio of CC1π+ to CCQE cross section
    energy_notes: mean energy 1.3GeV, W<2GeV
- bibtag: K2K:2006odf
  title: Measurement of the quasi-elastic axial vector mass in neutrino-oxygen interactions
  collaboration: K2K
  arxiv: hep-ex/0603034
  doi: 10.1103/PhysRevD.74.052002
  journal: Phys.Rev.D
  volume: '74'
  pages: '052002'
  year: 2006
  published_date: 2006-03
  inspire_recid: 712635
  citation_count: 317
  abstract: The weak nucleon axial-vector form factor for quasi-elastic interactions is determined using
    neutrino interaction data from the K2K Scintillating Fiber detector in the neutrino beam at KEK. More
    than 12,000 events are analyzed, of which half are charged-current quasi-elastic interactions nu-mu
    n to mu- p occurring primarily in oxygen nuclei. We use a relativistic Fermi gas model for oxygen
    and assume the form factor is approximately a dipole with one parameter, the axial vector mass M_A,
    and fit to the shape of the distribution of the square of the momentum transfer from the nucleon to
    the nucleus. Our best fit result for M_A = 1.20 \pm 0.12 GeV. Furthermore, this analysis includes
    updated vector form factors from recent electron scattering experiments and a discussion of the effects
    of the nucleon momentum on the shape of the fitted distributions.
  added: '2024-12-09'
  notes: null
  links:
