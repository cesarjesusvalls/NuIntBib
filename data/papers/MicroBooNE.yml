- bibtag: MicroBooNE:2019nio
  title: First Measurement of Inclusive Muon Neutrino Charged Current Differential Cross Sections on Argon
    at $E_\nu\sim$0.8 GeV with the MicroBooNE Detector
  collaboration: MicroBooNE
  arxiv: '1905.09694'
  doi: 10.1103/PhysRevLett.123.131801
  journal: Phys.Rev.Lett.
  volume: '123'
  pages: '131801'
  year: 2019
  published_date: '2019-05-23'
  inspire_recid: 1756332
  citation_count: 133
  abstract: We report the first measurement of the double-differential and total muon neutrino charged
    current inclusive cross sections on argon at a mean neutrino energy of 0.8 GeV. Data were collected
    using the MicroBooNE liquid argon time projection chamber located in the Fermilab Booster neutrino
    beam and correspond to $1.6 \times 10^{20}$ protons on target of exposure. The measured differential
    cross sections are presented as a function of muon momentum, using multiple Coulomb scattering as
    a momentum measurement technique, and the muon angle with respect to the beam direction. We compare
    the measured cross sections to multiple neutrino event generators and find better agreement with those
    containing more complete treatment of quasielastic scattering processes at low $Q^2$. The total flux
    integrated cross section is measured to be $0.693 \pm 0.010 \, (\text{stat}) \pm 0.165 \, (\text{syst})
    \times 10^{-38} \, \text{cm}^{2}$.
