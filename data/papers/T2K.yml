- bibtag: T2K:2017epu
  title: Measurement of the single $\pi^0$ production rate in neutral current neutrino interactions on
    water
  collaboration: T2K
  arxiv: '1704.07467'
  doi: 10.1103/PhysRevD.97.032002
  journal: Phys.Rev.D
  volume: '97'
  pages: '032002'
  year: 2018
  published_date: '2017-04-24'
  inspire_recid: 1594905
  citation_count: 21
  abstract: The single $\pi^0$ production rate in neutral current neutrino interactions on water in a
    neutrino beam with a peak neutrino energy of 0.6 GeV has been measured using the P{\O}D, one of the
    subdetectors of the T2K near detector. The production rate was measured for data taking periods when
    the P{\O}D contained water ($2.64\times{}10^{20}$ protons-on-target) and also periods without water
    ($3.49 \times 10^{20}$ protons-on-target). A measurement of the neutral current single $\pi^0$ production
    rate on water is made using appropriate subtraction of the production rate with water in from the
    rate with water out of the target region. The subtraction analysis yields 106 $\pm$ 41 (stat.) $\pm$
