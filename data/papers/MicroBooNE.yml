  abstract: We present a new measurement of the electron neutrino charged current cross section on argon
    without pions in the final state. This measurement uses the full MicroBooNE Booster Neutrino Beam
    dataset of $1.3\times 10^{21}$ protons on target collected at Fermi National Accelerator Laboratory.
    Events are considered both with and without protons above the kinetic energy visibility threshold.
    Differential cross sections are extracted in proton and electron kinematics, including energy and
    angle relative to the neutrino beam direction. The relationship between the hadronic and leptonic
    systems is explored through the angle between the proton and electron directions. The resulting cross
    sections are compared to a variety of available generator predictions using different models of neutrino
    interactions. We find good agreement with most models in lepton kinematics and some discrepancies
    in the hadronic system modeling, particularly in proton angle.
