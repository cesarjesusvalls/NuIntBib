- bibtag: MINOS:2007pwq
  title: Charge-Separated Atmospheric Neutrino-Induced Muons in the MINOS Far Detector
  collaboration: MINOS
  arxiv: hep-ex/0701045
  doi: 10.1103/PhysRevD.75.092003
  journal: Phys.Rev.D
  volume: '75'
  pages: 092003
  year: 2007
  published_date: 2007-01
  inspire_recid: 743147
  citation_count: 38
  abstract: We found 140 neutrino-induced muons in 854.24 live days in the MINOS far detector. We looked
    for evidence of neutrino disappearance in this data set by computing the ratio of the number of low
    momentum muons to the sum of the number of high momentum and unknown momentum muons for both data
    and Monte Carlo expectation in the absence of neutrino oscillations. The ratio of data and Monte Carlo
    ratios is consistent with an oscillation signal. A fit to the data for the oscillation parameters
    excludes the null oscillation hypothesis at the 94% confidence level. We separated the muons by charge
    sign in both the data and Monte Carlo events and found the ratio of the total number of negative to
    positive muons in both samples. The ratio of those ratios is a test of CPT conservation. The result
    is consistent with CPT conservation.
