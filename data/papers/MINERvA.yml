  abstract: This Letter presents measurements of single-differential cross sections of $ν_μ$-induced charged-current
    1 $π^{+}$ production on scintillator using the MINERvA detector at Fermilab. These measurements use
    traditional track-based pion reconstruction as well as pions identified solely via Michel electron
    decays, allowing measurement of kinetic energies from 0 to 350 MeV. In total, 91,843 events were selected
    with $W_{exp}$$<$ 1.4 GeV/c. Differential cross sections as a function of pion and muon kinematic
    variables are presented and compared with the predictions of several neutrino event generators. Overall,
    modern pion production models tend to agree with data at the ends of the kinematic regions probed,
    but are discrepant with the main regions of the phase space probed by up to 15% in muon observables
    and up to 20% in pion observables. No model describes any of the variables well, and this result highlights
    model areas that require improvement for the next generation of neutrino oscillation experiments.
  added: '2026-06-16'
