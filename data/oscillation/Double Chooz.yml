- bibtag: DoubleChooz:2012gmf
  title: Reactor electron antineutrino disappearance in the Double Chooz experiment
  collaboration: Double Chooz
  arxiv: '1207.6632'
  doi: 10.1103/PhysRevD.86.052008
  journal: Phys.Rev.D
  volume: '86'
  pages: 052008
  year: 2012
  published_date: 2012-07
  inspire_recid: 1124153
  citation_count: 617
  abstract: The Double Chooz experiment has observed 8,249 candidate electron antineutrino events in 227.93
    live days with 33.71 GW-ton-years (reactor power x detector mass x livetime) exposure using a 10.3
    cubic meter fiducial volume detector located at 1050 m from the reactor cores of the Chooz nuclear
    power plant in France. The expectation in case of theta13 = 0 is 8,937 events. The deficit is interpreted
    as evidence of electron antineutrino disappearance. From a rate plus spectral shape analysis we find
    sin^2 2{\theta}13 = 0.109 \pm 0.030(stat) \pm 0.025(syst). The data exclude the no-oscillation hypothesis
    at 99.8% CL (2.9{\sigma}).
