- bibtag: Super-Kamiokande:2002ujc
  title: Determination of solar neutrino oscillation parameters using 1496 days of Super-Kamiokande I
    data
  collaboration: Super-Kamiokande
  arxiv: hep-ex/0205075
  doi: 10.1016/S0370-2693(02)02090-7
  journal: Phys.Lett.B
  volume: '539'
  pages: '179'
  year: 2002
  published_date: 2002-05
  inspire_recid: 587157
  citation_count: 1173
  abstract: A number of different fits to solar neutrino mixing and mass square difference were performed
    using 1496 days of Super-Kamiokande-I's solar neutrino data. These data select two allowed areas at
    large neutrino mixing when combined with either the solar $^8$B flux prediction of the standard solar
    model or the SNO interaction rate measurements. A global fit combining SK data with the solar neutrino
    interaction rates measured by Homestake, SNO, Gallex/GNO and SAGE prefers a single allowed area, the
    Large Mixing Angle solution, at the 98.9% confidence level. The mass square difference $\Delta m^2$
    between the two mass eigenstates ranges from about 3 to $19\times10^{-5}$eV$^2$, while the mixing
    angle $\theta$ is in the range of $\tan^2\theta\approx$0.25--0.65.
