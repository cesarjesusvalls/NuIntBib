    topology: CC1pi0
    pion_bucket: pi0
    measurement_type: ratio
    observables: ratio of CC1π0 to CCQE cross section
    energy_notes: mean energy 1.3GeV
- bibtag: K2K:2008tus
  title: Measurement of single charged pion production in the charged-current interactions of neutrinos
    in a 1.3-GeV wide band beam
  collaboration: K2K
  arxiv: '0805.0186'
  doi: 10.1103/PhysRevD.78.032003
  journal: Phys.Rev.D
  volume: '78'
  pages: '032003'
  year: 2008
  published_date: 2008-05
  inspire_recid: 784875
  citation_count: 99
  abstract: Single charged pion production in charged-current muon neutrino interactions with carbon is
    studied using data collected in the K2K long-baseline neutrino experiment. The mean energy of the
    incident muon neutrinos is 1.3 GeV. The data used in this analysis are mainly from a fully active
    scintillator detector, SciBar. The cross section for single $\pi^{+}$ production in the resonance
    region ($W<2$ GeV/$c^2$) relative to the charged-current quasi-elastic cross section is found to be
    0.734 $^{+0.140}_{-0.153}$. The energy-dependent cross section ratio is also measured. The results
    are consistent with a previous experiment and the prediction of our model.
  added: '2024-12-09'
  notes: null
  links:
    arxiv: https://arxiv.org/abs/0805.0186
    doi: https://doi.org/10.1103/PhysRevD.78.032003
    inspire: https://inspirehep.net/literature?q=texkeys.raw:K2K:2008tus
