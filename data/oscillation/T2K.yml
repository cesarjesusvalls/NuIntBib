- bibtag: T2K:2025wet
  title: Joint neutrino oscillation analysis from the T2K and NOvA experiments
  collaboration: T2K
  arxiv: '2510.19888'
  doi: 10.1038/s41586-025-09599-3
  journal: Nature
  volume: '646'
  pages: '818'
  year: 2025
  published_date: '2025-10-22'
  inspire_recid: 3072534
  citation_count: 44
  abstract: The landmark discovery that neutrinos have mass and can change type (or "flavor") as they
    propagate -- a process called neutrino oscillation -- has opened up a rich array of theoretical and
    experimental questions being actively pursued today. Neutrino oscillation remains the most powerful
    experimental tool for addressing many of these questions, including whether neutrinos violate charge-parity
    (CP) symmetry, which has possible connections to the unexplained preponderance of matter over antimatter
    in the universe. Oscillation measurements also probe the mass-squared differences between the different
    neutrino mass states ($Δm^2$), whether there are two light states and a heavier one (normal ordering)
    or vice versa (inverted ordering), and the structure of neutrino mass and flavor mixing. Here, we
    carry out the first joint analysis of data sets from NOvA and T2K, the two currently operating long-baseline
    neutrino oscillation experiments (hundreds of kilometers of neutrino travel distance), taking advantage
    of our complementary experimental designs and setting new constraints on several neutrino sector parameters.
    This analysis provides new precision on the $Δm^2_{32}$ mass difference, finding $2.43^{+0.04}_{-0.03}\
    \left(-2.48^{+0.03}_{-0.04}\right)\times 10^{-3}~\mathrm{eV}^2$ in the normal (inverted) ordering,
    as well as a $3σ$ interval on $δ_{\rm CP}$ of $[-1.38π,\ 0.30π]$$\left([-0.92π,\ -0.04π]\right)$ in
    the normal (inverted) ordering. The data show no strong preference for either mass ordering, but notably
    if inverted ordering were assumed true within the three-flavor mixing paradigm, then our results would
    provide evidence of CP symmetry violation in the lepton sector.
