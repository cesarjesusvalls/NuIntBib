  abstract: Understanding electron neutrino interactions is crucial for measurements of neutrino oscillations
    and searches for new physics in neutrino experiments. We present the first measurement of the flux-averaged
    $ν_e$ + $\barν_e$ charged current single charged pion production cross section on argon using the
    MicroBooNE detector and data from the NuMI neutrino beam. The total cross section is measured to be
    (0.93 $\pm$ 0.13 (stat.) $\pm$ 0.27 (syst.)) $\times 10^{-39}$ cm$^2$/nucleon at a mean $ν_e$ + $\barν_e$
    energy of 730 MeV. Differential cross sections are also reported in electron energy, electron and
    pion angles, and electron-pion opening angle.
