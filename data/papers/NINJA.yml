- bibtag: NINJA:2020gbg
  title: First measurement of $\overline{\nu}_{\mu}$ and $\nu_{\mu}$ charged-current inclusive interactions
    on water using a nuclear emulsion detector
  collaboration: NINJA
  arxiv: '2008.03895'
  doi: 10.1103/PhysRevD.102.072006
  journal: Phys.Rev.D
  volume: '102'
  pages: '072006'
  year: 2020
  published_date: '2020-08-10'
  inspire_recid: 1810893
  citation_count: 41
  abstract: This paper reports the track multiplicity and kinematics of muons, charged pions, and protons
    from charged-current inclusive $\bar{\nu}_{\mu}$ and $\nu_{\mu}$ interactions on a water target, measured
    using a nuclear emulsion detector in the NINJA experiment. A 3-kg water target was exposed to the
    T2K antineutrino-enhanced beam with a mean energy of 1.3 GeV. Owing to the high-granularity of the
    nuclear emulsion, protons with momenta down to 200 MeV/$c$ from the neutrino-water interactions were
    detected. We find good agreement between the observed data and model predictions for all kinematic
    distributions other than the number of charged pions. These results demonstrate the capability of
    measurements with nuclear emulsion to improve neutrino interaction models.
