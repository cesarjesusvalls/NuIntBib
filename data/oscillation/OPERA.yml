- bibtag: OPERA:2018nar
  title: Final Results of the OPERA Experiment on $\nu_\tau$ Appearance in the CNGS Neutrino Beam
  collaboration: OPERA
  arxiv: '1804.04912'
  doi: 10.1103/PhysRevLett.120.211801
  journal: Phys.Rev.Lett.
  volume: '120'
  pages: '211801'
  year: 2018
  published_date: '2018-04-13'
  inspire_recid: 1667682
  citation_count: 233
  abstract: The OPERA experiment was designed to study $\nu_\mu\to\nu_\tau$ oscillations in appearance
    mode in the CNGS neutrino beam. In this letter we report the final analysis of the full data sample
    collected between 2008 and 2012, corresponding to $17.97\cdot 10^{19}$ protons on target. Selection
    criteria looser than in previous analyses have produced ten $\nu_\tau$ candidate events, thus reducing
    the statistical uncertainty in the measurement of the oscillation parameters and of $\nu_\tau$ properties.
    A multivariate approach for event identification has been applied to the candidate events and the
    discovery of $\nu_\tau$ appearance is confirmed with an improved significance level of 6.1 $\sigma$.
    $\Delta m^2_{23}$ has been measured, in appearance mode, with an accuracy of 20%. The measurement
    of $\nu_\tau$ CC cross-section, for the first time with a negligible contamination from $\bar{\nu}_\tau$,
    and the first direct observation of the $\nu_\tau$ lepton number are also reported.
