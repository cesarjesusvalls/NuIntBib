- bibtag: IceCube:2017ivd
  title: Search for sterile neutrino mixing using three years of IceCube DeepCore data
  collaboration: IceCube
  arxiv: '1702.05160'
  doi: 10.1103/PhysRevD.95.112002
  journal: Phys.Rev.D
  volume: '95'
  pages: '112002'
  year: 2017
  published_date: '2017-02-16'
  inspire_recid: 1514029
  citation_count: 171
  abstract: We present a search for a light sterile neutrino using three years of atmospheric neutrino
    data from the DeepCore detector in the energy range of approximately $10-60~$GeV. DeepCore is the
    low-energy sub-array of the IceCube Neutrino Observatory. The standard three-neutrino paradigm can
    be probed by adding an additional light ($\Delta m_{41}^2 \sim 1 \mathrm{\ eV^2}$) sterile neutrino.
    Sterile neutrinos do not interact through the standard weak interaction, and therefore cannot be directly
    detected. However, their mixing with the three active neutrino states leaves an imprint on the standard
    atmospheric neutrino oscillations for energies below 100 GeV. A search for such mixing via muon neutrino
    disappearance is presented here. The data are found to be consistent with the standard three neutrino
    hypothesis. Therefore we derive limits on the mixing matrix elements at the level of $|U_{\mu4}|^2
    < 0.11 $ and $|U_{\tau4}|^2 < 0.15 $ (90% C.L.) for the sterile neutrino mass splitting $\Delta m_{41}^2
    = 1.0$ eV$^2$.
