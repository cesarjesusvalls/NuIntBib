- bibtag: MiniBooNE:2020pnu
  title: Updated MiniBooNE neutrino oscillation results with increased data and new background studies
  collaboration: MiniBooNE
  arxiv: '2006.16883'
  doi: 10.1103/PhysRevD.103.052002
  journal: Phys.Rev.D
  volume: '103'
  pages: '052002'
  year: 2021
  published_date: '2020-06-30'
  inspire_recid: 1804293
  citation_count: 337
  abstract: The MiniBooNE experiment at Fermilab reports a total excess of $638.0 \pm 132.8$ electron-like
    events ($4.8 \sigma$) from a data sample corresponding to $18.75 \times 10^{20}$ protons-on-target
    in neutrino mode, which is a 46\% increase in the data sample with respect to previously published
    results, and $11.27 \times 10^{20}$ protons-on-target in antineutrino mode. The additional statistics
    allow several studies to address questions on the source of the excess. First, we provide two-dimensional
    plots in visible energy and cosine of the angle of the outgoing lepton, which can provide valuable
    input to models for the event excess. Second, we test whether the excess may arise from photons that
    enter the detector from external events or photons exiting the detector from $\pi^0$ decays in two
    model independent ways. Beam timing information shows that almost all of the excess is in time with
    neutrinos that interact in the detector. The radius distribution shows that the excess is distributed
    throughout the volume, while tighter cuts on the fiducal volume increase the significance of the excess.
    We conclude that models of the event excess based on entering and exiting photons are disfavored.
