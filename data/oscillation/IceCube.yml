- bibtag: IceCube:2016rnb
  title: Searches for Sterile Neutrinos with the IceCube Detector
  collaboration: IceCube
  arxiv: '1605.01990'
  doi: 10.1103/PhysRevLett.117.071801
  journal: Phys.Rev.Lett.
  volume: '117'
