  year: 2026
  published_date: '2026-05-30'
  inspire_recid: 3164246
  citation_count: 0
  abstract: 'Neutrino charged-current quasielastic-like scattering, a reaction category extensively used
    in neutrino oscillation measurements, receives contributions from single nucleon knockout processes,
    multinucleon processes, and inelastic scattering with subsequent rescattering or absorption in the
    nucleus to produce only nucleons in the final state. In this article, comparisons are presented of
    the same measurement in two different wideband neutrino beams: one beam peaks near 3 GeV with few
    neutrinos above 6 GeV; the other peaks near 6 GeV with few neutrinos above 10 GeV. Comparisons of
    differential cross sections in muon and proton kinematics for these two exposures probe deviations
    from free-neutron scattering that arise from the processes involving the nuclear medium, and provide
    a test of neutrino interaction models used to infer neutrino energies in oscillation experiments.
    Discrepancies are observed between the data and predictions that point to overestimates of the final
    state interactions of both protons and charged pions in quasielastic-like events.'
  added: '2026-06-16'
