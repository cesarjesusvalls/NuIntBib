    neutrino beam component of the beam above $1.5$~GeV using the large fiducial mass of the T2K $\pi^0$
    detector. The predominant poriton of the $\nu_e$ flux ($\sim$85 %) at these energies comes from kaon
    decays. The measured ratio of the observed beam interaction rate to the predicted rate in the detector
    with water targets filled is 0.89 $\pm$ 0.08 (stat.) $\pm$ 0.11 (sys.), and with the water targets
