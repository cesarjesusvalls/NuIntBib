- bibtag: T2K:2020txr
  title: Measurements of $\overline{\nu}_{\mu}$ and $\overline{\nu}_{\mu} + \nu_{\mu}$ charged-current
    cross-sections without detected pions or protons on water and hydrocarbon at a mean anti-neutrino
    energy of 0.86 GeV
  collaboration: T2K
  arxiv: '2004.13989'
  doi: 10.1093/ptep/ptab014
  journal: PTEP
  volume: '2021'
  pages: 043C01
  year: 2021
  published_date: '2020-04-29'
  inspire_recid: 1793459
  citation_count: 31
  abstract: We report measurements of the flux-integrated $\bar{\nu}_\mu$ and $\bar{\nu}_\mu+\nu_\mu$
    charged-current cross-sections on water and hydrocarbon targets using the T2K anti-neutrino beam,
    with a mean neutrino energy of 0.86 GeV. The signal is defined as the (anti-)neutrino charged-current
    interaction with one induced $\mu^\pm$ and no detected charged pion nor proton. These measurements
    are performed using a new WAGASCI module recently added to the T2K setup in combination with the INGRID
    Proton module. The phase space of muons is restricted to the high-detection efficiency region, $p_{\mu}>400~{\rm
    MeV}/c$ and $\theta_{\mu}<30^{\circ}$, in the laboratory frame. Absence of pions and protons in the
    detectable phase space of "$p_{\pi}>200~{\rm MeV}/c$ and $\theta_{\pi}<70^{\circ}$", and "$p_{\rm
    p}>600~{\rm MeV}/c$ and $\theta_{\rm p}<70^{\circ}$" is required. In this paper, both of the $\bar{\nu}_\mu$
    cross-sections and $\bar{\nu}_\mu+\nu_\mu$ cross-sections on water and hydrocarbon targets, and their
    ratios are provided by using D'Agostini unfolding method. The results of the integrated $\bar{\nu}_\mu$
    cross-section measurements over this phase space are $\sigma_{\rm H_{2}O}\,=\,(1.082\pm0.068(\rm stat.)^{+0.145}_{-0.128}(\rm
    syst.)) \times 10^{-39}~{\rm cm^{2}/nucleon}$, $\sigma_{\rm CH}\,=\,(1.096\pm0.054(\rm stat.)^{+0.132}_{-0.117}(\rm
    syst.)) \times 10^{-39}~{\rm cm^{2}/nucleon}$, and $\sigma_{\rm H_{2}O}/\sigma_{\rm CH} = 0.987\pm0.078(\rm
    stat.)^{+0.093}_{-0.090}(\rm syst.)$. The $\bar{\nu}_\mu+\nu_\mu$ cross-section is $\sigma_{\rm H_{2}O}
    = (1.155\pm0.064(\rm stat.)^{+0.148}_{-0.129}(\rm syst.)) \times 10^{-39}~{\rm cm^{2}/nucleon}$, $\sigma_{\rm
    CH}\,=\,(1.159\pm0.049(\rm stat.)^{+0.129}_{-0.115}(\rm syst.)) \times 10^{-39}~{\rm cm^{2}/nucleon}$,
    and $\sigma_{\rm H_{2}O}/\sigma_{\rm CH}\,=\,0.996\pm0.069(\rm stat.)^{+0.083}_{-0.078}(\rm syst.)$.
