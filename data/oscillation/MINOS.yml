  abstract: We report an improved measurement of muon anti-neutrino disappearance over a distance of 735km
    using the MINOS detectors and the Fermilab Main Injector neutrino beam in a muon anti-neutrino enhanced
    configuration. From a total exposure of 2.95e20 protons on target, of which 42% have not been previously
    analyzed, we make the most precise measurement of the anti-neutrino "atmospheric" delta-m squared
