  abstract: The NuTeV experiment at Fermilab has obtained a unique high statistics sample of neutrino
    and anti-neutrino interactions using its high-energy sign-selected beam. We present a measurement
    of the differential cross section for charged-current neutrino and anti-neutrino scattering from iron.
    Structure functions, F_2(x,Q^2) and xF_3(x,Q^2), are determined by fitting the inelasticity, y, dependence
    of the cross sections. This measurement has significantly improved systematic precision as a consequence
    of more precise understanding of hadron and muon energy scales.
