- bibtag: K2K:2005uiu
  title: Search for coherent charged pion production in neutrino-carbon interactions
  collaboration: K2K
  arxiv: hep-ex/0506008
  doi: 10.1103/PhysRevLett.95.252301
  journal: Phys.Rev.Lett.
  volume: '95'
  pages: '252301'
  year: 2005
  published_date: 2005-06
  inspire_recid: 684207
  citation_count: 240
  abstract: We report the result from a search for charged-current coherent pion production induced by
    muon neutrinos with a mean energy of 1.3 GeV. The data are collected with a fully active scintillator
    detector in the K2K long-baseline neutrino oscillation experiment. No evidence for coherent pion production
    is observed and an upper limit of $0.60 \times 10^{-2}$ is set on the cross section ratio of coherent
    pion production to the total charged-current interaction at 90% confidence level. This is the first
    experimental limit for coherent charged pion production in the energy region of a few GeV.
  added: '2024-12-09'
