  journal: Phys.Rev.D
  volume: '108'
  pages: '072011'
  year: 2023
  published_date: '2023-05-16'
  inspire_recid: 2660513
  citation_count: 48
  abstract: Muon neutrino and antineutrino disappearance probabilities are identical in the standard three-flavor
    neutrino oscillation framework, but CPT violation and non-standard interactions can violate this symmetry.
    In this work we report the measurements of $\sin^{2} \theta_{23}$ and $\Delta m_{32}^2$ independently
    for neutrinos and antineutrinos. The aforementioned symmetry violation would manifest as an inconsistency
    in the neutrino and antineutrino oscillation parameters. The analysis discussed here uses a total
    of 1.97$\times$10$^{21}$ and 1.63$\times$10$^{21}$ protons on target taken with a neutrino and antineutrino
    beam respectively, and benefits from improved flux and cross-section models, new near detector samples
    and more than double the data reducing the overall uncertainty of the result. No significant deviation
    is observed, consistent with the standard neutrino oscillation picture.
