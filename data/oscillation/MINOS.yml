  abstract: We report the final measurement of the neutrino oscillation parameters $\Delta m^2_{32}$ and
    $\sin^2\theta_{23}$ using all data from the MINOS and MINOS+ experiments. These data were collected
    using a total exposure of $23.76 \times 10^{20}$ protons on target producing $\nu_{mu}$ and $\overline{\nu_\mu}$
    beams and 60.75 kt$\cdot$yr exposure to atmospheric neutrinos. The measurement of the disappearance
    of $\nu_{\mu}$ and the appearance of $\nu_e$ events between the Near and Far detectors yields $|\Delta
    m^2_{32}|=2.40^{+0.08}_{-0.09}~(2.45^{+0.07}_{-0.08}) \times 10^{-3}$ eV$^2$ and $\sin^2\theta_{23}
    = 0.43^{+0.20}_{-0.04} ~(0.42^{+0.07}_{-0.03})$ at 68% C.L. for Normal (Inverted) Hierarchy.
