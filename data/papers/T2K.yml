  abstract: We report a measurement of cross section $\sigma(\nu_{\mu}+{\rm nucleus}\rightarrow\mu^{-}+X)$
    and the first measurements of the cross section $\sigma(\bar{\nu}_{\mu}+{\rm nucleus}\rightarrow\mu^{+}+X)$
    and their ratio $R(\frac{\sigma(\bar \nu)}{\sigma(\nu)})$ at (anti-)neutrino energies below 1.5 GeV.
