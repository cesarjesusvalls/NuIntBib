- bibtag: Bonetti:1977cs
  title: Study of Quasielastic Reactions of Neutrino and anti-neutrino in Gargamelle
  collaboration: Gargamelle
  arxiv: null
  doi: 10.1007/BF02730023
  journal: Nuovo Cim.A
  volume: '38'
  pages: '260'
  year: 1977
  published_date: '1977'
  inspire_recid: 124163
  citation_count: 148
  abstract: The quasi-elastic cross-sectionsσeltot and dσ/dq2 for the reactions 1) νn → μ−p and 2)\(\overline
    v \) → μ+n have been measured by using the data of the ν Gargamelle collaboration. 687 ν events, candidates
    for reaction 1), and 476\(\overline v \) events, candidates for the reactions 2), have been used for
    the analysis. Because the ν and\(\overline v \) interactions are on nuclei, suitable corrections for
    nuclear effects have been taken into account. In the framework of the «usual»V −A theory, by assuming
    for the axial form factor the dipolar formFA(q2)=1.23/(1 +q2/MA/2)2, our data have been fitted to
    the differential cross-section dσ/dq2 integrated over the ν and\(\overline v \) energy spectra and
    to the total cross-sectionσeltot as a function of the ν,\(\overline v \) energy to determine the best
    value for the parameterMA.
