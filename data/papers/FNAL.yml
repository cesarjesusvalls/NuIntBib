- bibtag: Barish:1979ny
  title: Study of the Reaction $\bar{\nu} p \to \mu^+ p \pi^-$
  collaboration: FNAL
  arxiv: null
  doi: 10.1016/0370-2693(80)90684-X
  journal: Phys.Lett.B
  volume: '91'
  pages: '161'
  year: 1980
  published_date: 1979-10
  inspire_recid: 8430
  citation_count: 42
  abstract: We present data on the reaction ν p → μ + pπ − from an exposure of the Fermilab 15 ft hydrogen
    bubble chamber. The channel cross section for 5 GeV < E ν < 70 GeV and M( p π − ) < 1.9 GeV is σ =
    (27 ± 5) × 10 −40 cm 2 . This cross section is dominated by the I = 1 2 production amplitude.
