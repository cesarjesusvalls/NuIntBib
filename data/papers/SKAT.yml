- bibtag: SKAT:1988qkt
  title: Cross-section Measurements of Single Pion Production in Charged Current Neutrino and Anti-neutrino
    Interactions
  collaboration: SKAT
  arxiv: null
  doi: 10.1007/BF01564697
  journal: Z.Phys.C
