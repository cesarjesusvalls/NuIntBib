- bibtag: MiniBooNE:2009atu
  title: A Search for Electron Antineutrino Appearance at the $\Delta m^2 \sim$ 1 $\mathrm{eV}^{2}$ Scale
  collaboration: MiniBooNE
  arxiv: '0904.1958'
  doi: 10.1103/PhysRevLett.103.111801
  journal: Phys.Rev.Lett.
  volume: '103'
  pages: '111801'
  year: 2009
  published_date: 2009-05
  inspire_recid: 817850
  citation_count: 166
  abstract: 'The MiniBooNE Collaboration reports initial results from a search for $\bar{\nu}_{\mu}\to\bar{\nu}_e$
    oscillations. A signal-blind analysis was performed using a data sample corresponding to $3.39 \times
    10^{20}$ protons on target. The data are consistent with background prediction across the full range
    of neutrino energy reconstructed assuming quasielastic scattering, $200 < E_{\nu}^{QE} < 3000$ MeV:
    144 electron-like events have been observed in this energy range, compared to an expectation of $139.2
    \pm 17.6$ events. No significant excess of events has been observed, both at low energy, 200-475 MeV,
    and at high energy, 475-1250 MeV. The data are inconclusive with respect to antineutrino oscillations
    suggested by data from the Liquid Scintillator Neutrino Detector at Los Alamos National Laboratory.'
