- bibtag: ArgoNeuT:2014ihi
  title: Detection of Back-to-Back Proton Pairs in Charged-Current Neutrino Interactions with the ArgoNeuT
    Detector in the NuMI Low Energy Beam Line
  collaboration: ArgoNeuT
  arxiv: '1405.4261'
  doi: 10.1103/PhysRevD.90.012008
  journal: Phys.Rev.D
  volume: '90'
  pages: 012008
  year: 2014
  published_date: '2014-05-16'
  inspire_recid: 1296836
  citation_count: 116
  abstract: Short range nucleon-nucleon correlations in nuclei (NN SRC) carry important information on
    nuclear structure and dynamics. NN SRC have been extensively probed through two-nucleon knock- out
    reactions in both pion and electron scattering experiments. We report here on the detection of two-nucleon
    knock-out events from neutrino interactions and discuss their topological features as possibly involving
    NN SRC content in the target argon nuclei. The ArgoNeuT detector in the Main Injector neutrino beam
    at Fermilab has recorded a sample of 30 fully reconstructed charged current events where the leading
    muon is accompanied by a pair of protons at the interaction vertex, 19 of which have both protons
    above the Fermi momentum of the Ar nucleus. Out of these 19 events, four are found with the two protons
    in a strictly back-to-back high momenta configuration directly observed in the final state and can
    be associated to nucleon Resonance pionless mechanisms involving a pre-existing short range correlated
    np pair in the nucleus. Another fraction (four events) of the remaining 15 events have a reconstructed
    back-to-back configuration of a np pair in the initial state, a signature compatible with one-body
    Quasi Elastic interaction on a neutron in a SRC pair. The detection of these two subsamples of the
    collected (mu- + 2p) events suggests that mechanisms directly involving nucleon-nucleon SRC pairs
    in the nucleus are active and can be efficiently explored in neutrino-argon interactions with the
    LAr TPC technology.
  added: '2024-12-09'
