  year: 2012
  published_date: 2011-06
  inspire_recid: 916049
  citation_count: 156
  abstract: The SciBooNE and MiniBooNE collaborations report the results of a \nu_\mu disappearance search
    in the \Delta m^2 region of 0.5-40 eV^2. The neutrino rate as measured by the SciBooNE tracking detectors
    is used to constrain the rate at the MiniBooNE Cherenkov detector in the first joint analysis of data
    from both collaborations. Two separate analyses of the combined data samples set 90% confidence level
    (CL) limits on \nu_\mu disappearance in the 0.5-40 eV^2 \Delta m^2 region, with an improvement over
    previous experimental constraints between 10 and 30 eV^2.
