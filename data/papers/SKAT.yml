  pages: '527'
  year: 1989
  published_date: '1988'
  inspire_recid: 267738
  citation_count: 72
  abstract: All six exclusive single pion production processes from neutrino and antineutrino charged
    current interactions are studied in the energy range between 3 and 30 GeV. Using a quark model for
    single pion production from Rein and Sehgal we fitted the aximal mass parameter from total cross sections
    and compare the results with values from other experiments and the world-averages.
