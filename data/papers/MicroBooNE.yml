- bibtag: MicroBooNE:2024zkh
  title: First Simultaneous Measurement of Differential Muon-Neutrino Charged-Current Cross Sections on
    Argon for Final States with and Without Protons Using MicroBooNE Data
  collaboration: MicroBooNE
