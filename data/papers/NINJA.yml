- bibtag: NINJA:2022zbi
  title: Measurements of protons and charged pions emitted from <math display="inline"><msub><mi>ν</mi><mi>μ</mi></msub></math>
    charged-current interactions on iron at a mean neutrino energy of 1.49 GeV using a nuclear emulsion
    detector
  collaboration: NINJA
  arxiv: '2203.08367'
  doi: 10.1103/PhysRevD.106.032016
  journal: Phys.Rev.D
  volume: '106'
  pages: '032016'
  year: 2022
  published_date: '2022-03-15'
  inspire_recid: 2053499
  citation_count: 7
  abstract: This study conducted an analysis of muons, protons, and charged pions emitted from $\nu_{\mu}$
    charged-current interactions on iron using a nuclear emulsion detector. The emulsion detector with
    a 65$\,$kg iron target was exposed to a neutrino beam corresponding to 4.0$\times$10$^{19}$ protons
    on target with a mean neutrino energy of 1.49$\,$GeV. The measurements were performed at a momentum
    threshold of 200 (50)$\,$MeV/$c$ for protons (pions), which are the lowest momentum thresholds attempted
    up to now. The measured quantities are the multiplicities, emission angles, and momenta of the muons,
    protons, and charged pions. In addition to these inclusive measurements, exclusive measurements such
    as the muon-proton emission-angle correlations of specific channels and the opening angle between
    the protons of CC0$\pi$2$p$ events were performed. The data were compared to Monte Carlo (MC) predictions
    and some significant differences were observed. The results of the study demonstrate the capability
    of detailed measurements of neutrino-nucleus interactions using a nuclear emulsion detector to improve
    neutrino interaction models.
