- bibtag: NOvA:2022see
  title: Measurement of the $\nu_e-$Nucleus Charged-Current Double-Differential Cross Section at $\left<
    E_{\nu} \right> = $ 2.4 GeV using NOvA
  collaboration: NOvA
  arxiv: '2206.10585'
