- bibtag: K2K:2010xeb
  title: Measurement of inclusive $\pi^0$ production in the Charged-Current Interactions of Neutrinos
    in a 1.3-GeV wide band beam
  collaboration: K2K
  arxiv: '1012.1794'
  doi: 10.1103/PhysRevD.83.054023
  journal: Phys.Rev.D
  volume: '83'
  pages: '054023'
  year: 2011
  published_date: 2010-12
  inspire_recid: 880001
  citation_count: 34
  abstract: In this paper we report on the measurement of the rate of inclusive $\pi^0$ production induced
    by charged-current neutrino interactions in a C$_8$H$_8$ target at a mean energy of 1.3 GeV in the
    K2K near detector. Out of a sample of 11,606 charged current neutrino interactions, we select 479
    $\pi^0$ events with two reconstructed photons. We find that the cross section for the inclusive $\pi^0$
    production relative to the charged-current quasi-elastic cross section is $$\frac{\sigma_{CC\pi^0}}{\sigma_{CCQE}}=0.426\pm0.032(stat.)\pm0.035(syst.)$$
    The energy dependent cross section ratio is also measured. The results are consistent with previous
    experiments for exclusive channels on different targets.
  added: '2024-12-09'
  notes: null
  links:
    arxiv: https://arxiv.org/abs/1012.1794
    doi: https://doi.org/10.1103/PhysRevD.83.054023
    inspire: https://inspirehep.net/literature?q=texkeys.raw:K2K:2010xeb
