  abstract: We report measurements of oscillation parameters from $\nu_{mu}$ and $\bar{\nu}_{\mu}$ disappearance
    using beam and atmospheric data from MINOS. The data comprise exposures of \unit[$10.71 \times 10^{20}$]{protons
    on target (POT)} in the $\nu_{\mu}$-dominated beam, $\unit[3.36\times10^{20}]{POT}}$ in the $\bar{\nu}_{\mu}$-enhanced
    beam, and 37.88 kton-years of atmospheric neutrinos. Assuming identical $\nu$ and $\bar{\nu}$ oscillation
    parameters, we measure \mbox{$|\Delta m^2}| = \unit[2.41^{+0.09}_{-0.10}) \times 10^{-3}]{eV^{2}}$}
    and $\sin^{2}/!/left(2\theta \right) = 0.950^{+0.035}_{-0.036}$. Allowing independent $\nu$ and $\bar{\nu}$
    oscillations, we measure antineutrino parameters of $|\Delta \bar{m}^2| = \unit[(2.50 ^{+0.23}_{-0.25})
    \times 10^{-3}]{eV^{2}}$ and $\sin^{2}/!/left(2\bar{\theta} \right) = 0.97^{+0.03}_{-0.08}$, with
    minimal change to the neutrino parameters.
