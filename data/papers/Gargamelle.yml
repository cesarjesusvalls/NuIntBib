  abstract: The cross section ratio of the elastic neutral current reaction ν p→ ν p to the quasi-elastic
    charged current reaction ν n→ μ − p has been measured in the kinematical region 0.3⩽ q 2 ⩽1.0 (GeV/
    c ) 2 . The measured value is R M =0.17±0.08. Model dependent corrections are applied, especially
    for ν n→ ν n contamination, and the result is compared to various models.
