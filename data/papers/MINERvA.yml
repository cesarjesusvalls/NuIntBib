  abstract: Accelerator based neutrino oscillation experiments seek to measure the relative number of
    electron and muon neutrinos and antineutrinos at different $L/E$ values. However high statistics studies
    of neutrino interactions are almost exclusively measured using muon neutrinos and antineutrinos since
    the dominant flavor of neutrinos produced by accelerator based beams are of the muon type. This work
    reports new measurements of electron neutrino and antineutrino interactions in hydrocarbon, obtained
    by strongly suppressing backgrounds initiated by muon flavor neutrinos and antineutrinos. Double differential
    cross sections as a function of visible energy transfer, $E_\text{avail}$, and transverse momentum
    transfer, $p_T$, or three momentum transfer, $q_3$ are presented.
