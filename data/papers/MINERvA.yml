- bibtag: MINERvA:2013bcy
  title: Measurement of Muon Antineutrino Quasielastic Scattering on a Hydrocarbon Target at Eν∼3.5  GeV
  collaboration: MINERvA
  arxiv: '1305.2234'
  doi: 10.1103/PhysRevLett.111.022501
  journal: Phys.Rev.Lett.
  volume: '111'
  pages: '022501'
  year: 2013
  published_date: '2013-05-09'
  inspire_recid: 1232962
  citation_count: 244
  abstract: We have isolated muon anti-neutrino charged-current quasi-elastic interactions occurring in
    the segmented scintillator tracking region of the MINERvA detector running in the NuMI neutrino beam
    at Fermilab. We measure the flux-averaged differential cross-section, d{\sigma}/dQ^2, and compare
    to several theoretical models of quasi-elastic scattering. Good agreement is obtained with a model
    where the nucleon axial mass, M_A, is set to 0.99 GeV/c^2 but the nucleon vector form factors are
    modified to account for the observed enhancement, relative to the free nucleon case, of the cross-section
    for the exchange of transversely polarized photons in electron-nucleus scattering. Our data at higher
    Q^2 favor this interpretation over an alternative in which the axial mass is increased.
