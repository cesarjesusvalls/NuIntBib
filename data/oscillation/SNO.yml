- bibtag: SNO:2002hgz
  title: Measurement of day and night neutrino energy spectra at SNO and constraints on neutrino mixing
    parameters
  collaboration: SNO
  arxiv: nucl-ex/0204009
  doi: 10.1103/PhysRevLett.89.011302
  journal: Phys.Rev.Lett.
  volume: '89'
  pages: '011302'
  year: 2002
  published_date: 2002-04
  inspire_recid: 585724
  citation_count: 1470
  abstract: The Sudbury Neutrino Observatory (SNO) has measured day and night solar neutrino energy spectra
    and rates. For charged current events, assuming an undistorted $^8$B spectrum, the night minus day
    rate is $14.0% \pm 6.3% ^{+1.5}_{-1.4}%$ of the average rate. If the total flux of active neutrinos
    is additionally constrained to have no asymmetry, the $\nu_e$ asymmetry is found to be $7.0% \pm 4.9%
    ^{+1.3}_{-1.2}%$. A global solar neutrino analysis in terms of matter-enhanced oscillations of two
    active flavors strongly favors the Large Mixing Angle (LMA) solution.
