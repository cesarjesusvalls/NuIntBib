  citation_count: 40
  abstract: 'A study of strange particle production in muon neutrino charged current interactions has
    been performed using the data from the NOMAD experiment. Yields of neutral strange particles K0s,
    Lambda, AntiLambda have been measured. Mean multiplicities are reported as a function of the event
    kinematic variables Enu, W2 and Q2 as well as of the variables describing particle behaviour within
    a hadronic jet: xF, z and pT2. Decays of resonances and heavy hyperons with identified K0s and Lambda
    in the final state have been analyzed. Clear signals corresponding to K*+-, Sigma*+-, Xi- and Sigma0
    have been observed.'
