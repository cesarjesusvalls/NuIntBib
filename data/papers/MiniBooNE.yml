- bibtag: MiniBooNE:2010eis
  title: Measurement of Neutrino-Induced Charged-Current Charged Pion Production Cross Sections on Mineral
    Oil at E$_{\nu}\sim 1~\textrm{GeV}$
  collaboration: MiniBooNE
