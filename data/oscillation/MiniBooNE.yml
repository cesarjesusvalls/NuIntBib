- bibtag: MiniBooNE:2012maf
  title: A Combined $\nu_\mu \rightarrow \nu_e$ and $\bar \nu_\mu \rightarrow \bar \nu_e$ Oscillation
    Analysis of the MiniBooNE Excesses
  collaboration: MiniBooNE
  arxiv: '1207.4809'
  doi: null
