- bibtag: MiniBooNE:2009dxl
  title: Measurement of $\nu_\mu$ and $\bar{\nu}_\mu$ induced neutral current single $\pi^0$ production
    cross sections on mineral oil at $E_\nu \sim {\cal O}(1 {\rm GeV})$
  collaboration: MiniBooNE
  arxiv: '0911.2063'
  doi: 10.1103/PhysRevD.81.013005
  journal: Phys.Rev.D
  volume: '81'
  pages: '013005'
  year: 2010
  published_date: 2009-11
  inspire_recid: 836624
  citation_count: 206
  abstract: MiniBooNE reports the first absolute cross sections for neutral current single \pi^0 production
    on CH_2 induced by neutrino and antineutrino interactions measured from the largest sets of NC \pi^0
    events collected to date. The principal result consists of differential cross sections measured as
    functions of \pi^0 momentum and \pi^0 angle averaged over the neutrino flux at MiniBooNE. We find
    total cross sections of (4.76+/-0.05_{stat}+/-0.40_{sys})*10^{-40} cm^2/nucleon at a mean energy of
    <E_\nu>=808 MeV and (1.48+/-0.05_{stat}+/-0.14_{sys})*10^{-40} cm^2/nucleon at a mean energy of <E_\nu>=664
    MeV for \nu_\mu and \bar\nu_\mu induced production, respectively. In addition, we have included measurements
    of the neutrino and antineutrino total cross sections for incoherent exclusive NC 1\pi^0 production
    corrected for the effects of final state interactions to compare to prior results.
