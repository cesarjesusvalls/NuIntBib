- bibtag: ANTARES:2018rtf
  title: Measuring the atmospheric neutrino oscillation parameters and constraining the 3+1 neutrino model
    with ten years of ANTARES data
  collaboration: ANTARES
  arxiv: '1812.08650'
  doi: 10.1007/JHEP06(2019)113
  journal: JHEP
  volume: '06'
  pages: '113'
  year: 2019
  published_date: '2018-12-20'
  inspire_recid: 1710363
  citation_count: 93
  abstract: The ANTARES neutrino telescope has an energy threshold of a few tens of GeV. This allows to
    study the phenomenon of atmospheric muon neutrino disappearance due to neutrino oscillations. In a
    similar way, constraints on the 3+1 neutrino model, which foresees the existence of one sterile neutrino,
    can be inferred. Using data collected by the ANTARES neutrino telescope from 2007 to 2016, a new measurement
    of $\Delta m^2_{32}$ and $\theta_{23}$ has been performed - which is consistent with world best-fit
    values - and constraints on the 3+1 neutrino model have been derived.
