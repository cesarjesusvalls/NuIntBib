- bibtag: Ahrens:1988rr
  title: A Study of the Axial Vector Form-factor and Second Class Currents in Anti-neutrino Quasielastic
    Scattering
  collaboration: BNL
  arxiv: null
  doi: 10.1016/0370-2693(88)90026-3
  journal: Phys.Lett.B
