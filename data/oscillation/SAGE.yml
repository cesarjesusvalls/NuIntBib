  abstract: The Russian-American solar neutrino experiment has measured the capture rate of neutrinos
    on metallic gallium in a radiochemical experiment at the Baksan Neutrino Observatory. Eight years
    of measurement give the result 67.2 (+7.2,-7.0) (+3.5,-3.0) solar neutrino units, where the uncertainties
    are statistical and systematic, respectively. The restrictions these results impose on vacuum neutrino
    oscillation parameters are given.
