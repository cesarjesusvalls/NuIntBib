- bibtag: KM3NeT:2024jji
  title: Search for quantum decoherence in neutrino oscillations with six detection units of KM3NeT/ORCA
  collaboration: KM3NeT
  arxiv: '2410.01388'
  doi: 10.1088/1475-7516/2025/03/039
  journal: JCAP
  volume: '03'
  pages: 039
  year: 2025
  published_date: '2024-10-02'
  inspire_recid: 2836603
  citation_count: 14
  abstract: Neutrinos described as an open quantum system may interact with the environment which introduces
    stochastic perturbations to their quantum phase. This mechanism leads to a loss of coherence along
    the propagation of the neutrino $-$ a phenomenon commonly referred to as decoherence $-$ and ultimately,
    to a modification of the oscillation probabilities. Fluctuations in space-time, as envisaged by various
    theories of quantum gravity, are a potential candidate for a decoherence-inducing environment. Consequently,
    the search for decoherence provides a rare opportunity to investigate quantum gravitational effects
    which are usually beyond the reach of current experiments. In this work, quantum decoherence effects
    are searched for in neutrino data collected by the KM3NeT/ORCA detector from January 2020 to November
    2021. The analysis focuses on atmospheric neutrinos within the energy range of a few GeV to $100\,\mathrm{GeV}$.
    Adopting the open quantum system framework, decoherence is described in a phenomenological manner
    with the strength of the effect given by the parameters $\Gamma_{21}$ and $\Gamma_{31}$. Following
    previous studies, a dependence of the type $\Gamma_{ij} \propto (E/E_0)^n$ on the neutrino energy
    is assumed and the cases $n = -2,-1$ are explored. No significant deviation with respect to the standard
    oscillation hypothesis is observed. Therefore, $90\,\%$ CL upper limits are estimated as $\Gamma_{21}
    < 4.6\cdot 10^{-21}\,$GeV and $\Gamma_{31} < 8.4\cdot 10^{-21}\,$GeV for $n = -2$, and $\Gamma_{21}
    < 1.9\cdot 10^{-22}\,$GeV and $\Gamma_{31} < 2.7\cdot 10^{-22}\,$GeV for $n = -1$, respectively.
  added: '2026-06-21'
  notes: null
