- bibtag: SciBooNE:2011qyf
  title: Dual baseline search for muon neutrino disappearance at $0.5 {\rm eV}^2 < \Delta m^2 < 40 {\rm
    eV}^2$
  collaboration: SciBooNE
  arxiv: '1106.5685'
  doi: 10.1103/PhysRevD.85.032007
  journal: Phys.Rev.D
  volume: '85'
