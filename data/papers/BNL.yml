  abstract: We have studied the neutral-current reactions νμN→νμN′π0 and ν¯μN→ν¯μN′π0 and compared them
    to the charged-current reactions νμN→μ−N′′π0 and ν¯μN→μ+N′′π0. We have measured the ratios R0′=σ(νμN→νμN′π0)2σ(νμN→μ−N′′π0)
    and R¯0′=σ(ν¯μN→ν¯μN′π0)2σ(ν¯μN→μ+N′′π0) to be 0.17±0.04 and 0.39±0.18, respectively. We also present
    the π0p invariant-mass distribution of the neutrino-induced reactions.
