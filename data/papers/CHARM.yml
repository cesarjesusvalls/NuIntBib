- bibtag: CHARM:1980yym
  title: Experimental Study of Neutral Current and Charged Current Neutrino Cross-Sections
  collaboration: CHARM
  arxiv: null
  doi: 10.1016/0370-2693(81)91123-0
  journal: Phys.Lett.B
  volume: '99'
  pages: '265'
  year: 1981
  published_date: 1980-12
  inspire_recid: 156267
  citation_count: 211
  abstract: Samples of 9200 muon-neutrino and 3800 muon-antineutrino interactions on nuclei were obtained
    with the fine-grain calorimeter of the CHARM Collaboration at the CERN 200 GeV narrow-band neutrino
    beam. The interactions were classified as either neutral-current or charged-current processes on an
    event-by-event basis. Neutral-current and charged-current cross sections in neutrino and antineutrino
    interactions are presented. From these results we deduce a statistically significant contribution
    of right-handed coupling to the neutral hadronic current, and a value of the electroweak mixing angle
    corresponding to sin 2 θ = 0.220 ± 0.014.
  added: '2026-06-16'
  notes: High-energy DIS-era measurement (added via 2605.28671 cross-check).
