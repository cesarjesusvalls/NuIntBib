  abstract: Results are reported from a search for active to sterile neutrino oscillations in the MINOS
    long-baseline experiment, based on the observation of neutral-current neutrino interactions, from
    an exposure to the NuMI neutrino beam of $7.07\times10^{20}$ protons on target. A total of 802 neutral-current
    event candidates is observed in the Far Detector, compared to an expected number of $754\pm28\rm{(stat.)}\pm{37}\rm{(syst.)}$
