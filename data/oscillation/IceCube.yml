- bibtag: IceCube:2014flw
  title: Determining neutrino oscillation parameters from atmospheric muon neutrino disappearance with
    three years of IceCube DeepCore data
  collaboration: IceCube
  arxiv: '1410.7227'
  doi: 10.1103/PhysRevD.91.072004
  journal: Phys.Rev.D
  volume: '91'
  pages: '072004'
  year: 2015
  published_date: '2014-10-27'
  inspire_recid: 1324373
  citation_count: 285
  abstract: We present a measurement of neutrino oscillations via atmospheric muon neutrino disappearance
    with three years of data of the completed IceCube neutrino detector. DeepCore, a region of denser
    instrumentation, enables the detection and reconstruction of atmospheric muon neutrinos between 10
    GeV and 100 GeV, where a strong disappearance signal is expected. The detector volume surrounding
    DeepCore is used as a veto region to suppress the atmospheric muon background. Neutrino events are
    selected where the detected Cherenkov photons of the secondary particles minimally scatter, and the
    neutrino energy and arrival direction are reconstructed. Both variables are used to obtain the neutrino
    oscillation parameters from the data, with the best fit given by $\Delta m^2_{32}=2.72^{+0.19}_{-0.20}\times
    10^{-3}\,\mathrm{eV}^2$ and $\sin^2\theta_{23} = 0.53^{+0.09}_{-0.12}$ (normal mass hierarchy assumed).
    The results are compatible and comparable in precision to those of dedicated oscillation experiments.
