    observables: differential Q2 distribution
    energy_notes: 'E: 1-8GeV'
- bibtag: MINOS:2009ugl
  title: Neutrino and Antineutrino Inclusive Charged-current Cross Section Measurements with the MINOS
    Near Detector
  collaboration: MINOS
  arxiv: '0910.2201'
  doi: 10.1103/PhysRevD.81.072002
  journal: Phys.Rev.D
  volume: '81'
  pages: '072002'
  year: 2010
  published_date: 2009-10
  inspire_recid: 833709
  citation_count: 213
  abstract: The energy dependence of the neutrino-iron and antineutrino-iron inclusive charged-current
    cross sections and their ratio have been measured using a high-statistics sample with the MINOS Near
    Detector exposed to the NuMI beam from the Main Injector at Fermilab. Neutrino and antineutrino fluxes
    were determined using a low hadronic energy subsample of charged-current events. We report measurements
    of neutrino-Fe (antineutrinoFe) cross section in the energy range 3-50 GeV (5-50 GeV) with precision
    of 2-8% (3-9%) and their ratio which is measured with precision 2-8%. The data set spans the region
    from low energy, where accurate measurements are sparse, up to the high-energy scaling region where
    the cross section is well understood.
  added: '2024-12-09'
  notes: null
  links:
    arxiv: https://arxiv.org/abs/0910.2201
