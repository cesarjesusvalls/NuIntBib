  title: First Indication of Solar <math display="inline"><mrow><mmultiscripts><mrow><mi mathvariant="normal">B</mi></mrow><mprescripts/><none/><mrow><mn>8</mn></mrow></mmultiscripts></mrow></math>
    Neutrinos through Coherent Elastic Neutrino-Nucleus Scattering in PandaX-4T
  collaboration: PandaX
  arxiv: '2407.10892'
  doi: 10.1103/PhysRevLett.133.191001
  journal: Phys.Rev.Lett.
  volume: '133'
