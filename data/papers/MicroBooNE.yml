- bibtag: MicroBooNE:2021sfa
  title: First Measurement of Energy-Dependent Inclusive Muon Neutrino Charged-Current Cross Sections
    on Argon with the MicroBooNE Detector
  collaboration: MicroBooNE
  arxiv: '2110.14023'
  doi: 10.1103/PhysRevLett.128.151801
