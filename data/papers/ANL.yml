- bibtag: Day:1983itd
  title: STUDY OF neutrino D CHARGED CURRENT TWO PION PRODUCTION IN THE THRESHOLD REGION
  collaboration: ANL
  arxiv: null
  doi: 10.1103/PhysRevD.28.2714
  journal: Phys.Rev.D
  volume: '28'
  pages: '2714'
  year: 1983
  published_date: '1983'
  inspire_recid: 200475
  citation_count: 45
  abstract: We present our final results on double-pion production by muon-type neutrinos observed in
    a 2.4×106 (365 000) picture exposure of the Argonne 12-foot deuterium- (hydrogen-) filled bubble chamber.
    The reactions νd→μ−π−π+pps, νd→μ−π+π0pns, and νd→μ−π+π+nns are studied. The data, which shows strong
    Δ(1236) production, has nucleon-π−π mass distribution peaked at low masses in all three reactions.
    The excitation functions for the three reactions exhibit a rapid rise over the energy range from threshold
    up to about 3 GeV, but thereafter the energy dependence appears less pronounced. The threshold behavior
    of the cross sections for these reactions is analyzed in the context of a model developed by Adjei,
    Dicus, and Teplitz. Data from the constrained reaction, νd→μ−π−π+pps, satisfy the Adler conserved-vector-current
    test.
