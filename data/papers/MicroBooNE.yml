- bibtag: MicroBooNE:2024zwf
  title: Inclusive cross section measurements in final states with and without protons for charged-current
    <math display="inline"><mrow><msub><mrow><mi>ν</mi></mrow><mrow><mi>μ</mi></mrow></msub></mrow></math>-Ar
