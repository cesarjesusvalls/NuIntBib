- bibtag: K2K:2002icj
  title: Indications of neutrino oscillation in a 250 km long baseline experiment
  collaboration: K2K
  arxiv: hep-ex/0212007
  doi: 10.1103/PhysRevLett.90.041801
  journal: Phys.Rev.Lett.
  volume: '90'
  pages: 041801
  year: 2003
  published_date: 2002-12
  inspire_recid: 603717
  citation_count: 1377
  abstract: 'The K2K experiment observes indications of neutrino oscillation: a reduction of $\nu_\mu$
    flux together with a distortion of the energy spectrum. Fifty-six beam neutrino events are observed
    in Super-Kamiokande (SK), 250 km from the neutrino production point, with an expectation of $80.1^{+6.2}_{-5.4}$.
    Twenty-nine one ring $\mu$-like events are used to reconstruct the neutrino energy spectrum, which
    is better matched to the expected spectrum with neutrino oscillation than without. The probability
    that the observed flux at SK is explained by statistical fluctuation without neutrino oscillation
    is less than 1%.'
