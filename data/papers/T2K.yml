- bibtag: T2K:2018rnz
  title: Characterization of nuclear effects in muon-neutrino scattering on hydrocarbon with a measurement
    of final-state kinematics and correlations in charged-current pionless interactions at T2K
  collaboration: T2K
  arxiv: '1802.05078'
  doi: 10.1103/PhysRevD.98.032003
