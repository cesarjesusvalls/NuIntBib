- bibtag: RENO:2020hva
  title: Search for sterile neutrino oscillations using RENO and NEOS data
  collaboration: RENO
  arxiv: '2011.00896'
  doi: 10.1103/PhysRevD.105.L111101
  journal: Phys.Rev.D
  volume: '105'
  pages: L111101
  year: 2022
  published_date: '2020-11-02'
  inspire_recid: 1827478
  citation_count: 73
  abstract: We present a reactor model independent search for sterile neutrino oscillation using 2 509
    days of RENO near detector data and 180 days of NEOS data. The reactor related systematic uncertainties
    are significantly suppressed as both detectors are located at the same reactor complex of Hanbit Nuclear
    Power Plant. The search is performed by electron antineutrino ($\overline{\nu}_e$) disappearance between
    six reactors and two detectors with baselines of 294 m (RENO) and 24 m (NEOS). A spectral comparison
    of the NEOS prompt-energy spectrum with a no-oscillation prediction from the RENO measurement can
    explore reactor $\overline{\nu}_e$ oscillations to sterile neutrino. Based on the comparison, we obtain
    a 95% C.L. excluded region of $0.1<|\Delta m_{41}^2|<7$ eV$^2$. We also obtain a 68% C.L. allowed
    region with the best fit of $|\Delta m_{41}^2|=2.41\,\pm\,0.03\,$ eV$^2$ and $\sin^2 2\theta_{14}$=0.08$\,\pm\,$0.03
    with a p-value of 8.2%. Comparisons of obtained reactor antineutrino spectra at reactor sources are
    made among RENO, NEOS, and Daya Bay to find a possible spectral variation.
