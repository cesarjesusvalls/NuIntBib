- bibtag: MiniBooNE:2012meu
  title: Dual baseline search for muon antineutrino disappearance at $0.1 {\rm eV}^2 < {\Delta}m^2 < 100
    {\rm eV}^2$
  collaboration: MiniBooNE
  arxiv: '1208.0322'
  doi: 10.1103/PhysRevD.86.052009
  journal: Phys.Rev.D
  volume: '86'
  pages: 052009
  year: 2012
  published_date: 2012-08
  inspire_recid: 1124583
  citation_count: 178
  abstract: The MiniBooNE and SciBooNE collaborations report the results of a joint search for short baseline
    disappearance of \bar{{\nu}_{\mu}} at Fermilab's Booster Neutrino Beamline. The MiniBooNE Cherenkov
    detector and the SciBooNE tracking detector observe antineutrinos from the same beam, therefore the
    combined analysis of their datasets serves to partially constrain some of the flux and cross section
    uncertainties. Uncertainties in the {\nu}_{\mu} background were constrained by neutrino flux and cross
    section measurements performed in both detectors. A likelihood ratio method was used to set a 90%
    confidence level upper limit on \bar{{\nu}_{\mu}} disappearance that dramatically improves upon prior
    limits in the {\Delta}m^2=0.1-100 eV^2 region.
