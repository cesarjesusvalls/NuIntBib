- bibtag: MicroBooNE:2024bnl
  title: Measurement of the differential cross section for neutral pion production in charged-current
    muon neutrino interactions on argon with the MicroBooNE detector
  collaboration: MicroBooNE
  arxiv: '2404.09949'
  doi: 10.1103/PhysRevD.110.092014
  journal: Phys.Rev.D
  volume: '110'
  pages: 092014
  year: 2024
  published_date: '2024-04-15'
  inspire_recid: 2777824
  citation_count: 17
  abstract: We present a measurement of neutral pion production in charged-current interactions using
    data recorded with the MicroBooNE detector exposed to Fermilab's booster neutrino beam. The signal
    comprises one muon, one neutral pion, any number of nucleons, and no charged pions. Studying neutral
    pion production in the MicroBooNE detector provides an opportunity to better understand neutrino-argon
    interactions, and is crucial for future accelerator-based neutrino oscillation experiments. Using
    a dataset corresponding to $6.86 \times 10^{20}$ protons on target, we present single-differential
    cross sections in muon and neutral pion momenta, scattering angles with respect to the beam for the
    outgoing muon and neutral pion, as well as the opening angle between the muon and neutral pion. Data
    extracted cross sections are compared to generator predictions. We report good agreement between the
    data and the models for scattering angles, except for an over-prediction by generators at muon forward
    angles. Similarly, the agreement between data and the models as a function of momentum is good, except
    for an underprediction by generators in the medium momentum ranges, $200-400$ MeV for muons and $100-200$
    MeV for pions.
