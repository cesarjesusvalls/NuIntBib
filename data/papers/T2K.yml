- bibtag: T2K:2013nor
  title: Measurement of the inclusive $ν_μ$ charged current cross section on carbon in the near detector
    of the T2K experiment
  collaboration: T2K
  arxiv: '1302.4908'
  doi: 10.1103/PhysRevD.87.092003
  journal: Phys.Rev.D
  volume: '87'
  pages: 092003
  year: 2013
  published_date: '2013-02-20'
  inspire_recid: 1220379
  citation_count: 181
  abstract: T2K has performed the first measurement of \nu{\mu} inclusive charged current interactions
    on carbon at neutrino energies of ~1 GeV where the measurement is reported as a flux-averaged double
    differential cross section in muon momentum and angle. The flux is predicted by the beam Monte Carlo
    and external data, including the results from the NA61/SHINE experiment. The data used for this measurement
    were taken in 2010 and 2011, with a total of 10.8 x 10^{19} protons-on-target. The analysis is performed
    on 4485 inclusive charged current interaction candidates selected in the most upstream fine-grained
    scintillator detector of the near detector. The flux-averaged total cross section is <\sigma_CC>_\phi
    =(6.91 +/- 0.13 (stat) +/- 0.84 (syst)) x10^{-39} cm^2/nucleon for a mean neutrino energy of 0.85
    GeV.
