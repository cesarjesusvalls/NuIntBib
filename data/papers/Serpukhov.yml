  abstract: Experimental results on the study of quasielastic reactionsvμn→μ−p and\(\bar v_u p \to \mu
    ^ +n\) in the energy range 3–30 GeV are presented in this paper. Spark chamber detector with Al filters
    has been exposed to the wide-band neutrino and antineutrino beams at Serpukhov. Neutrino and antineutrino
    data have been used to reconstruct the behaviour of axial-vector form-factorFA(Q2). We measured the
    total cross-sections as a function of energy. The parameterMA=(1.00±0.04) GeV/c2 has been determined
    under the assumption of the dipole parametrization and CVC hypothesis. Upper limit for the second
    class currents was estimated.
