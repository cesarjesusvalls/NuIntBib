- bibtag: MINERvA:2019rhx
  title: Measurement of $\bar{\nu}_{\mu}$ Charged-Current Single $\pi^{-}$ Production on Hydrocarbon in
    the Few-GeV Region using MINERvA
  collaboration: MINERvA
  arxiv: '1906.08300'
  doi: 10.1103/PhysRevD.100.052008
