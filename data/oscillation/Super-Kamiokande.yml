  title: Tau neutrinos favored over sterile neutrinos in atmospheric muon-neutrino oscillations
  collaboration: Super-Kamiokande
  arxiv: hep-ex/0009001
  doi: 10.1103/PhysRevLett.85.3999
  journal: Phys.Rev.Lett.
  volume: '85'
  pages: '3999'
  year: 2000
  published_date: 2000-09
  inspire_recid: 532783
  citation_count: 1005
  abstract: The previously published atmospheric neutrino data did not distinguish whether muon neutrinos
    were oscillating into tau neutrinos or sterile neutrinos, as both hypotheses fit the data. Using data
    recorded in 1100 live-days of the Super-Kamiokande detector, we use three complementary data samples
    to study the difference in zenith angle distribution due to neutral currents and matter effects. We
    find no evidence favoring sterile neutrinos, and reject the hypothesis at the 99% confidence level.
    On the other hand, we find that oscillation between muon and tau neutrinos suffices to explain all
    the results in hand.
