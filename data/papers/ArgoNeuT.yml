  citation_count: 43
  abstract: The ArgoNeuT collaboration reports the first measurement of neutral current $\pi^{0}$ production
    in $\nu_{\mu}$-argon and $\bar{\nu}_{\mu}$-argon scattering. This measurement was performed using
    the ArgoNeuT liquid argon time projection chamber deployed at Fermilab's NuMI neutrino beam with an
    exposure corresponding to 1.2$\times 10^{20}$ protons-on-target from the Fermilab Main Injector and
    a mean energy for $\nu_{\mu}$ of 9.6~GeV and for $\bar{\nu}_{\mu}$ of 3.6~GeV. We compare the measured
    cross section and kinematic distributions to predictions from the GENIE and NuWro neutrino interaction
    event generators.
