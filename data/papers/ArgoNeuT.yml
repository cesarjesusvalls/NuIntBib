- bibtag: ArgoNeuT:2015ldo
  title: Measurement of $\nu_{\mu}$ and $\bar{\nu}_{\mu}$ neutral current $\pi^{0} \rightarrow \gamma\gamma$
    production in the ArgoNeuT detector
  collaboration: ArgoNeuT
