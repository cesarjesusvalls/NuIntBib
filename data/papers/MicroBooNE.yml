  citation_count: 0
  abstract: We report a measurement of the charged-current coherent pion production cross section on argon
    using the MicroBooNE liquid argon time projection chamber exposed to the Booster Neutrino Beam at
    Fermilab. The measurement uses the MicroBooNE data set corresponding to $1.26 \times 10^{21}$ protons
    on target with a mean neutrino energy of $0.8$~GeV. The flux-averaged cross section is measured to
    be $(9.1 \pm 1.2_{\text{stat}} \pm 1.2_\text{syst}) \times 10^{-40}\,\text{cm}^2/\text{Ar}$. This
    result represents the first measurement of charged-current coherent pion production on argon at sub-GeV
    neutrino energies. Due to its clean two-body kinematics, where the neutrino interacts coherently with
    the entire nucleus producing a forward muon and pion with no nuclear breakup, this process provides
    a useful tool for constraining neutrino flux uncertainties in current and future oscillation experiments
    such as DUNE.
