- bibtag: BEBCWA21:1986pvd
  title: Measurement of Total Cross-sections for Neutrino and Anti-neutrino Charged Current Interactions
    in Hydrogen and Neon
  collaboration: BEBC
  arxiv: null
  doi: 10.1016/0370-2693(86)90248-0
  journal: Phys.Lett.B
  volume: '173'
  pages: '211'
  year: 1986
  published_date: 1986-03
  inspire_recid: 227412
  citation_count: 31
  abstract: BEBC filled in turn with hydrogen, and with a neon-hydrogen mixture, was exposed to the CERN
    SPS wide band neutrino and antineutrino beams. The ratios of the charged-current cross sections per
    nucleon, σ(νH 2 ) σ(ν Ne ) and σ( ν H 2 ) σ( ν Ne ) , between 20 and 300 GeV were found to be 0.656
    ± 0.020 and 1.425 ± 0.052, respectively. Multiplying these ratios by the revised cross sections in
    neon, σ(ν Ne ) E = (0.723 ± 0.038) × 10 −38 cm 2 / GeV per nucleon and σ( ν Ne ) E = (0.351 ± 0.019)
    × 10 −38 cm 2 / GeV per nucleon, and their ratio, σ( ν Ne ) σ(ν Ne ) = 0.485 ± 0.020 ,, yields values
    for the total charged-current cross sections on protons, σ(νp)/ E and σ( ν p ) E , of (0.474 ± 0.029)
    × 10 −38 cm 2 /GeV and (0.500 ± 0.032) × 10 −38 cm 2 /GeV. respectively, and a value for the ratio
    σ( ν p ) σ(ν p ) of 1.053 ± 0.066.
  added: '2026-06-16'
