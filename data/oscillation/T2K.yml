  abstract: We have made improved measurements of three-flavor neutrino mixing with 19.7(16.3)$\times
    10^{20}$ protons on target in (anti-)neutrino-enhanced beam modes. A new sample of muon-neutrino events
    with tagged pions has been added at the far detector, as well as new proton and photon-tagged samples
    at the near detector. Significant improvements have been made to the flux and neutrino interaction
    modeling. T2K data continue to prefer the normal mass ordering and upper octant of $\sin^2θ_{23}$
    with a near-maximal value of the charge-parity violating phase with best-fit values in the normal
    ordering of $δ_{\scriptscriptstyle\mathrm{CP}}=-2.18\substack{+1.22 \\ -0.47}$, $\sin^2θ_{23}=0.559\substack{+0.018
