- bibtag: IceCube:2020phf
  title: eV-Scale Sterile Neutrino Search Using Eight Years of Atmospheric Muon Neutrino Data from the
    IceCube Neutrino Observatory
  collaboration: IceCube
  arxiv: '2005.12942'
  doi: 10.1103/PhysRevLett.125.141801
  journal: Phys.Rev.Lett.
  volume: '125'
