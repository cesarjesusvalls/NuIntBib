  title: Search for Electron Antineutrino Appearance in a Long-baseline Muon Antineutrino Beam
  collaboration: T2K
  arxiv: '1911.07283'
  doi: 10.1103/PhysRevLett.124.161802
  journal: Phys.Rev.Lett.
  volume: '124'
