- bibtag: SNO:2024wzq
  title: Initial measurement of reactor antineutrino oscillation at SNO+
  collaboration: SNO
  arxiv: '2405.19700'
  doi: 10.1140/epjc/s10052-024-13687-5
  journal: Eur.Phys.J.C
  volume: '85'
  pages: '17'
  year: 2025
  published_date: '2024-05-30'
  inspire_recid: 2791608
  citation_count: 18
  abstract: The SNO+ collaboration reports its first spectral analysis of long-baseline reactor antineutrino
    oscillation using 114 tonne-years of data. Fitting the neutrino oscillation probability to the observed
    energy spectrum yields constraints on the neutrino mass-squared difference $\Delta m^2_{21}$. In the
    ranges allowed by previous measurements, the best-fit $\Delta m^2_{21}$ is (8.85$^{+1.10}_{-1.33}$)
    $\times$ 10$^{-5}$ eV$^2$. This measurement is continuing in the next phases of SNO+ and is expected
    to surpass the present global precision on $\Delta m^2_{21}$ with about three years of data.
