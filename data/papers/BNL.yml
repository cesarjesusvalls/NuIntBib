- bibtag: Baker:1981su
  title: 'Quasielastic Neutrino Scattering: A Measurement of the Weak Nucleon Axial Vector Form-Factor'
  collaboration: BNL
  arxiv: null
  doi: 10.1103/PhysRevD.23.2499
  journal: Phys.Rev.D
  volume: '23'
  pages: '2499'
  year: 1981
  published_date: 1981-06
  inspire_recid: 170354
  citation_count: 344
  abstract: The quasielastic reaction νμn→μ−p was studied in an experiment using the BNL 7-foot deuterium
    bubble chamber exposed to the wide-band neutrino beam with an average energy of 1.6 GeV. A total of
    1138 quasielastic events in the momentum-transfer range Q2=0.06−3.00 (GeV/c)2 were selected by kinematic
    fitting and particle identification and were used to extract the axial-vector form factor FA(Q2) from
    the Q2 distribution. In the framework of the conventional V−A theory, we find that the dipole parametrization
    is favored over the monopole. The value of the axial-vector mass MA in the dipole parametrization
    is 1.07±0.06 GeV, which is in good agreement with both recent neutrino and electroproduction experiments.
    In addition, the standard assumptions of conserved vector current and no second-class currents are
    checked.
  added: '2026-06-16'
  notes: Imported from PhD thesis Chapter 3 classification tables.
