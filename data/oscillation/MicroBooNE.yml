- bibtag: MicroBooNE:2025nll
  title: Search for light sterile neutrinos with two neutrino beams at MicroBooNE
  collaboration: MicroBooNE
  arxiv: '2512.07159'
  doi: 10.1038/s41586-025-09757-7
  journal: Nature
  volume: '648'
  pages: '64'
  year: 2025
  published_date: '2025-12-03'
  inspire_recid: 3088922
  citation_count: 26
  abstract: The existence of three distinct neutrino flavours, $ν_{e}$, $ν_μ$, and $ν_τ$, is a central
    tenet of the Standard Model of particle physics. Quantum-mechanical interference can allow a neutrino
    of one initial flavour to be detected some time later as a different flavour, a process called neutrino
    oscillation. Several anomalous observations inconsistent with this three-flavour picture have motivated
    the hypothesis that an additional neutrino state exists which does not interact directly with matter,
    termed a "sterile" neutrino, $ν_s$. This includes anomalous observations from the LSND and MiniBooNE
    experiments, consistent with $ν_μ\rightarrowν_{e}$ transitions at a distance inconsistent with the
    three-neutrino picture. Here, we use data obtained from the MicroBooNE liquid-argon time projection
    chamber in two accelerator neutrino beams to exclude the single light sterile neutrino interpretation
    of the LSND and MiniBooNE anomalies at the 95% confidence level (CL). Additionally, we rule out a
    significant portion of the parameter space that could explain the gallium anomaly. This is the first
    measurement to use two accelerator neutrino beams to break a degeneracy between $ν_{e}$ appearance
    and disappearance that would otherwise weaken the sensitivity to the sterile neutrino hypothesis.
    We find no evidence for either $ν_μ\rightarrowν_{e}$ flavour transitions or $ν_{e}$ disappearance
    that would indicate non-standard flavour oscillations. Our results show that previous anomalous observations
    consistent with $ν_μ\rightarrowν_{e}$ transitions cannot be explained by introducing a single sterile
    neutrino state.
