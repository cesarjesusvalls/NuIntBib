- bibtag: OPERA:2013tlg
  title: New results on $\nu_\mu \to \nu_\tau$ appearance with the OPERA experiment in the CNGS beam
  collaboration: OPERA
  arxiv: '1308.2553'
  doi: 10.1007/JHEP11(2013)036
  journal: JHEP
