- bibtag: DoubleChooz:2013dxe
  title: First Measurement of $\theta_{13}$ from Delayed Neutron Capture on Hydrogen in the Double Chooz
    Experiment
  collaboration: Double Chooz
  arxiv: '1301.2948'
  doi: 10.1016/j.physletb.2013.04.050
  journal: Phys.Lett.B
  volume: '723'
  pages: '66'
  year: 2013
  published_date: 2013-01
  inspire_recid: 1210656
  citation_count: 195
  abstract: The Double Chooz experiment has determined the value of the neutrino oscillation parameter
    $\theta_{13}$ from an analysis of inverse beta decay interactions with neutron capture on hydrogen.
    This analysis uses a three times larger fiducial volume than the standard Double Chooz assessment,
    which is restricted to a region doped with gadolinium (Gd), yielding an exposure of 113.1 GW-ton-years.
    The data sample used in this analysis is distinct from that of the Gd analysis, and the systematic
    uncertainties are also largely independent, with some exceptions, such as the reactor neutrino flux
    prediction. A combined rate- and energy-dependent fit finds $\sin^2 2\theta_{13}=0.097\pm 0.034(stat.)
    \pm 0.034 (syst.)$, excluding the no-oscillation hypothesis at 2.0 \sigma. This result is consistent
    with previous measurements of $\sin^2 2\theta_{13}$.
