- bibtag: SciBooNE:2009nlf
  title: Measurement of Inclusive Neutral Current Neutral $\pi^0$ Production on Carbon in a Few-GeV Neutrino
    Beam
  collaboration: SciBooNE
  arxiv: '0910.5768'
  doi: 10.1103/PhysRevD.81.033004
  journal: Phys.Rev.D
  volume: '81'
  pages: '033004'
  year: 2010
  published_date: 2009-10
  inspire_recid: 835586
  citation_count: 82
  abstract: The SciBooNE Collaboration reports inclusive neutral current neutral pion production by a
    muon neutrino beam on a polystyrene target (C8H8). We obtain (7.7 \pm 0.5(stat.) \pm 0.5 (sys.)) x
    10^(-2) as the ratio of the neutral current neutral pion production to total charged current cross
    section; the mean energy of neutrinos producing detected neutral pions is 1.1 GeV. The result agrees
    with the Rein-Sehgal model implemented in our neutrino interaction simulation program with nuclear
    effects. The spectrum shape of the neutral pion momentum and angle agree with the model. We also measure
    the ratio of the neutral current coherent pion production to total charged current cross section to
    be (0.7 \pm 0.4) x 10^(-2).
  added: '2024-12-09'
  notes: null
