- bibtag: RENO:2016ujo
  title: Spectral Measurement of the Electron Antineutrino Oscillation Amplitude and Frequency using 500
    Live Days of RENO Data
  collaboration: RENO
  arxiv: '1610.04326'
  doi: 10.1103/PhysRevD.98.012002
