- bibtag: KM3NeT:2021hkj
  title: First neutrino oscillation measurement in KM3NeT/ORCA
  collaboration: KM3NeT
  arxiv: null
  doi: 10.22323/1.395.1123
  journal: PoS
  volume: ICRC2021
  pages: '1123'
  year: 2021
  published_date: '2021'
  inspire_recid: 1930102
  citation_count: 23
  abstract: The KM3NeT/ORCA is a next-generation neutrino detector currently under construction in the
    Mediterranean Sea. There are currently 6 Detection Units deployed, and in the past year the detector
    has been steadily taking data. Here the first neutrino oscillation measurement is presented using
    data taken with the ORCA detector 6 Detection Units, containing 354.6 days of exposure. Selection
    criteria are discussed, followed by a neutrino oscillation analysis. In the analysis it is found that
    oscillations are preferred with a confidence level of 5.9 $\sigma$ over "no oscillations". Likelihood
    scans of the $\Delta m_{31}^2$ and $\sin^2 \theta_{23}$ parameter also show a strong exclusion of
    the no oscillation hypothesis. The sensitivity contour in $(\sin^2\theta_{23}, \Delta m_{31}^2)$ is
    presented, showing results that are approaching to being being competitive with other experiments.
