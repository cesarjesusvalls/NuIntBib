- bibtag: MicroBooNE:2025rch
  title: Measurement of single charged pion production in charged-current <math display="inline"><msub><mi>ν</mi><mi>μ</mi></msub></math>-Ar
    interactions with the MicroBooNE detector
  collaboration: MicroBooNE
  arxiv: '2509.03628'
