- bibtag: T2K:2023mcm
  title: Updated T2K measurements of muon neutrino and antineutrino disappearance using <math display="inline"><mrow><mn>3.6</mn><mo>×</mo><mrow><msup><mrow><mn>10</mn></mrow><mrow><mn>21</mn></mrow></msup></mrow></mrow></math>
