- bibtag: Kitagaki:1983px
  title: High-Energy Quasielastic $\nu_{\mu} n \to \mu^- p$ Scattering in Deuterium
  collaboration: FNAL
  arxiv: null
  doi: 10.1103/PhysRevD.28.436
  journal: Phys.Rev.D
  volume: '28'
  pages: '436'
  year: 1983
  published_date: '1983'
  inspire_recid: 195139
  citation_count: 288
  abstract: We have studied the quasielastic reaction νμn→μ−p in an exposure of the Fermilab deuterium-filled
    15-foot bubble chamber to a high-energy wide-band neutrino beam. From an analysis of the Q2 distribution
    based on the standard V−A theory, the axial-vector mass in a dipole parametrization of the axial-vector
    form factor is determined to be MA=1.05−0.16+0.12 GeV, consistent with the values previously reported
    from low-energy experiments.
  added: '2026-06-16'
