- bibtag: SciBooNE:2010lca
  title: Improved Measurement of Neutral Current Coherent $\pi^0$ Production on Carbon in a Few-GeV Neutrino
    Beam
  collaboration: SciBooNE
  arxiv: '1005.0059'
  doi: 10.1103/PhysRevD.81.111102
  journal: Phys.Rev.D
  volume: '81'
  pages: '111102'
  year: 2010
  published_date: 2010-05
  inspire_recid: 853762
  citation_count: 99
  abstract: The SciBooNE Collaboration reports a measurement of neutral current coherent neutral pion
    production on carbon by a muon neutrino beam with average energy 0.8 GeV. The separation of coherent
    from inclusive neutral pion production has been improved by detecting recoil protons from resonant
    neutral pion production. We measure the ratio of the neutral current coherent neutral pion production
    to total charged current cross sections to be (1.16 +/- 0.24) x 10-2. The ratio of charged current
    coherent pion to neutral current coherent pion production is calculated to be 0.14+0.30 -0.28, using
    our published charged current coherent pion measurement.
  added: '2024-12-09'
