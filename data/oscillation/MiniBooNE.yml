- bibtag: MiniBooNE:2010idf
  title: Event Excess in the MiniBooNE Search for $\bar \nu_\mu \rightarrow \bar \nu_e$ Oscillations
  collaboration: MiniBooNE
  arxiv: '1007.1150'
  doi: 10.1103/PhysRevLett.105.181801
