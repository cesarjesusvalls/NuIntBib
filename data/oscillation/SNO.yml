- inspire_recid: 585723
  title: Direct evidence for neutrino flavor transformation from neutral current interactions in the Sudbury
    Neutrino Observatory
  abstract: Observations of neutral current neutrino interactions on deuterium in the Sudbury Neutrino
    Observatory are reported. Using the neutral current, elastic scattering, and charged current reactions
    and assuming the standard 8B shape, the electron-neutrino component of the 8B solar flux is 1.76 +/-0.05(stat.)+/-0.09(syst.)
    x10^6/(cm^2 s), for a kinetic energy threshold of 5 MeV. The non-electron neutrino component is 3.41+/-0.45(stat.)+0.48,-0.45(syst.)
    x10^6/(cm^2 s), 5.3 standard deviations greater than zero, providing strong evidence for solar electron
    neutrino flavor transformation. The total flux measured with the NC reaction is 5.09 +0.44,-0.43(stat.)+0.46,-0.43(syst.)x10^6/(cm^2
    s), consistent with solar models.
