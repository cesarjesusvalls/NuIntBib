- bibtag: SNO:2005oxr
  title: Electron energy spectra, fluxes, and day-night asymmetries of B-8 solar neutrinos from measurements
    with NaCl dissolved in the heavy-water detector at the Sudbury Neutrino Observatory
  collaboration: SNO
  arxiv: nucl-ex/0502021
  doi: 10.1103/PhysRevC.72.055502
  journal: Phys.Rev.C
  volume: '72'
  pages: '055502'
  year: 2005
  published_date: 2005-02
  inspire_recid: 677505
  citation_count: 1103
  abstract: Results are reported from the complete salt phase of the Sudbury Neutrino Observatory experiment
    in which NaCl was dissolved in the D$_2$O target. The addition of salt enhanced the signal from neutron
    capture, as compared to the pure D$_2$O detector. By making a statistical separation of charged-current
    events from other types based on event-isotropy criteria, the effective electron recoil energy spectrum
    has been extracted. In units of $ 10^6$ cm$^{-2}$ s$^{-1}$, the total flux of active-flavor neutrinos
    from $^8$B decay in the Sun is found to be $4.94^{+0.21}_{-0.21}{(stat)}^{+0.38}_{-0.34}{(syst)}$
    and the integral flux of electron neutrinos for an undistorted $^8$B spectrum is $1.68^{+0.06}_{-0.06}{(stat)}^{+0.08}_{-0.09}{(syst)}$;
    the signal from ($\nu_x$,e) elastic scattering is equivalent to an electron-neutrino flux of $2.35^{+0.22}_{-0.22}{(stat)}^{+0.15}_{-0.15}{(syst)}$.
    These results are consistent with those expected for neutrino oscillations with the so-called Large
    Mixing Angle parameters, and also with an undistorted spectrum. A search for matter-enhancement effects
    in the Earth through a possible day-night asymmetry in the charged-current integral rate is consistent
    with no asymmetry. Including results from other experiments, the best-fit values for two-neutrino
    mixing parameters are $\Delta m^2 = (8.0^{+0.6}_{-0.4}) \times 10^{-5}$ eV$^2$ and $\theta = 33.9
    ^{+2.4}_{-2.2}$ degrees.
  added: '2026-06-21'
