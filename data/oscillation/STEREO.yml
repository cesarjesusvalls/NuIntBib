- bibtag: STEREO:2019lwz
  title: Search for light sterile neutrinos with the STEREO experiment
  collaboration: STEREO
  arxiv: null
  doi: 10.1051/epjconf/201921908001
  journal: EPJ Web Conf.
  volume: '219'
  pages: 08001
  year: 2019
  published_date: '2019'
  inspire_recid: 1770580
  citation_count: 2
  abstract: The stereo experiment is searching for a non-standard oscillation in the propagation of anti-neutrinos
    produced by a nuclear reactor which could be the sign for the existence of a sterile state of eV mass
    and the origin of the reactor anti-neutrino anomaly. In this paper, results from 66 days of reactor
    turned on and 138 days of reactor turned off are reported excluding large amplitude oscillations.
    A special focus is put on the data analysis and studies of correlated backgrounds. In particular the
    origin of the correlated background measured in reactor turned off periods is discussed. This background
    mainly originates from neutrons produced by cosmic radiation.
