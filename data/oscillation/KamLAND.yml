- bibtag: KamLAND:2004mhv
  title: 'Measurement of neutrino oscillation with KamLAND: Evidence of spectral distortion'
  collaboration: KamLAND
  arxiv: hep-ex/0406035
  doi: 10.1103/PhysRevLett.94.081801
  journal: Phys.Rev.Lett.
  volume: '94'
  pages: 081801
  year: 2005
  published_date: 2004-06
  inspire_recid: 652319
  citation_count: 1801
  abstract: We present results of a study of neutrino oscillation based on a 766 ton-year exposure of
    KamLAND to reactor anti-neutrinos. We observe 258 \nuebar\ candidate events with energies above 3.4
    MeV compared to 365.2 events expected in the absence of neutrino oscillation. Accounting for 17.8
    expected background events, the statistical significance for reactor \nuebar disappearance is 99.998%.
    The observed energy spectrum disagrees with the expected spectral shape in the absence of neutrino
    oscillation at 99.6% significance and prefers the distortion expected from \nuebar oscillation effects.
    A two-neutrino oscillation analysis of the KamLAND data gives \DeltaMSq = 7.9$^{+0.6}_{-0.5}\times10^{-5}$
    eV$^2$. A global analysis of data from KamLAND and solar neutrino experiments yields \DeltaMSq = 7.9$^{+0.6}_{-0.5}\times10^{-5}$
    eV$^2$ and \ThetaParam = 0.40$^{+0.10}_{-0.07}$, the most precise determination to date.
