  inspire_recid: 2793710
  citation_count: 16
  abstract: This Letter reports the first measurement of the oscillation amplitude and frequency of reactor
    antineutrinos at Daya Bay via neutron capture on hydrogen using 1958 days of data. With over 3.6 million
    signal candidates, an optimized candidate selection, improved treatment of backgrounds and efficiencies,
    refined energy calibration, and an energy response model for the capture-on-hydrogen sensitive region,
    the relative $\overline{\nu}_{e}$ rates and energy spectra variation among the near and far detectors
    gives $\mathrm{sin}^22\theta_{13} = 0.0759_{-0.0049}^{+0.0050}$ and $\Delta m^2_{32} = (2.72^{+0.14}_{-0.15})\times10^{-3}$
    eV$^2$ assuming the normal neutrino mass ordering, and $\Delta m^2_{32} = (-2.83^{+0.15}_{-0.14})\times10^{-3}$
    eV$^2$ for the inverted neutrino mass ordering. This estimate of $\sin^2 2\theta_{13}$ is consistent
    with and essentially independent from the one obtained using the capture-on-gadolinium sample at Daya
    Bay. The combination of these two results yields $\mathrm{sin}^22\theta_{13}= 0.0833\pm0.0022$, which
    represents an 8% relative improvement in precision regarding the Daya Bay full 3158-day capture-on-gadolinium
    result.
