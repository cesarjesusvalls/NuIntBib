  abstract: Charged-current $\nu_{\mu}$ interactions on carbon, iron, and lead with a final state hadronic
    system of one or more protons with zero mesons are used to investigate the influence of the nuclear
    environment on quasielastic-like interactions. The transfered four-momentum squared to the target
    nucleus, $Q^2$, is reconstructed based on the kinematics of the leading proton, and differential cross
    sections versus $Q^2$ and the cross-section ratios of iron, lead and carbon to scintillator are measured
    for the first time in a single experiment. The measurements show a dependence on atomic number. While
    the quasielastic-like scattering on carbon is compatible with predictions, the trends exhibited by
