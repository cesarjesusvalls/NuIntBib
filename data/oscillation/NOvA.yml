- bibtag: NOvA:2024imi
  title: Dual-Baseline Search for Active-to-Sterile Neutrino Oscillations in NOvA
  collaboration: NOvA
  arxiv: '2409.04553'
  doi: 10.1103/PhysRevLett.134.081804
  journal: Phys.Rev.Lett.
  volume: '134'
  pages: 081804
  year: 2025
  published_date: '2024-09-06'
  inspire_recid: 2826226
  citation_count: 20
  abstract: We report a search for neutrino oscillations to sterile neutrinos under a model with three
    active and one sterile neutrinos (3+1 model). This analysis uses the NOvA detectors exposed to the
    NuMI beam, running in neutrino mode. The data exposure, 13.6e20 protons on target, doubles that previously
    analyzed by NOvA, and the analysis is the first to use $\nu_{\mu}$ charged-current interactions in
    conjunction with neutral-current interactions. Neutrino samples in the Near and Far detectors are
    fitted simultaneously, enabling the search to be carried out over a $\Delta m^2_{41}$ range extending
    2 (3) orders of magnitude above (below) 1 eV$^2$. NOvA finds no evidence for active-to-sterile neutrino
    oscillations under the 3+1 model at 90% confidence level. New limits are reported in multiple regions
    of parameter space, excluding some regions currently allowed by IceCube at 90% confidence level. We
    additionally set the most stringent limits for anomalous $\nu_{\tau}$ appearance for $\Delta m^{2}_{41}
    \le 3$ eV$^2$.
