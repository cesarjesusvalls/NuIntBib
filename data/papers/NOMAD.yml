  abstract: Backward proton and $\pi^-$ production has been studied in $\nu_{\mu}CC$ interactions with
    carbon nuclei. Detailed analyses of the momentum distributions, of the production rates, and of the
    general features of events with a backward going particle, have been carried out in order to understand
    the mechanism producing these particles. The backward proton data have been compared with the predictions
    of the reinteraction and the short range correlation models.
