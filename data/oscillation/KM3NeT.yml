- bibtag: KM3NeT:2024ecf
  title: Measurement of neutrino oscillation parameters with the first six detection units of KM3NeT/ORCA
  collaboration: KM3NeT
  arxiv: '2408.07015'
  doi: 10.1007/JHEP10(2024)206
  journal: JHEP
  volume: '10'
  pages: '206'
  year: 2024
  published_date: '2024-08-13'
  inspire_recid: 2817709
  citation_count: 44
  abstract: KM3NeT/ORCA is a water Cherenkov neutrino detector under construction and anchored at the
    bottom of the Mediterranean Sea. The detector is designed to study oscillations of atmospheric neutrinos
    and determine the neutrino mass ordering. This paper focuses on an initial configuration of ORCA,
    referred to as ORCA6, which comprises six out of the foreseen 115 detection units of photo-sensors.
    A high-purity neutrino sample was extracted, corresponding to an exposure of 433 kton-years. The sample
    of 5828 neutrino candidates is analysed following a binned log-likelihood method in the reconstructed
    energy and cosine of the zenith angle. The atmospheric oscillation parameters are measured to be $\sin^2\theta_{23}=
    0.51^{+0.04}_{-0.05}$, and $ \Delta m^2_{31} = 2.14^{+0.25}_{-0.35}\times 10^{-3}~\mathrm{eV^2} \cup
    \{-2.25,-1.76\}\times 10^{-3}~\mathrm{eV^2}$ at 68% CL. The inverted neutrino mass ordering hypothesis
    is disfavoured with a p-value of 0.25.
