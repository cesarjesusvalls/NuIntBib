- bibtag: LSND:1997vqj
  title: Evidence for muon-neutrino ---> electron-neutrino oscillations from pion decay in flight neutrinos
  collaboration: LSND
  arxiv: nucl-ex/9706006
  doi: 10.1103/PhysRevC.58.2489
  journal: Phys.Rev.C
  volume: '58'
