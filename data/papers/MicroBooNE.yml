- bibtag: MicroBooNE:2023foc
  title: Measurement of three-dimensional inclusive muon-neutrino charged-current cross sections on argon
    with the MicroBooNE detector
  collaboration: MicroBooNE
  arxiv: '2307.06413'
  doi: 10.1016/j.physletb.2025.139939
  journal: Phys.Lett.B
  volume: '870'
  pages: '139939'
  year: 2025
  published_date: '2023-07-12'
  inspire_recid: 2676594
  citation_count: 18
  abstract: We report the measurement of the differential cross section $d^{2}σ(E_ν)/ d\cos(θ_μ) dP_μ$
    for inclusive muon-neutrino charged-current scattering on argon. This measurement utilizes data from
    6.4$\times10^{20}$ protons on target of exposure collected using the MicroBooNE liquid argon time
    projection chamber located along the Fermilab Booster Neutrino Beam with a mean neutrino energy of
    approximately 0.8~GeV. The mapping from reconstructed kinematics to truth quantities, particularly
    from reconstructed to true neutrino energy, is validated within uncertainties by comparing the distribution
    of reconstructed hadronic energy in data to that of the model prediction in different muon scattering
    angle bins after applying a conditional constraint from the muon momentum distribution in data. The
    success of this validation gives confidence that the missing energy in the MicroBooNE detector is
    well-modeled within uncertainties in simulation, enabling the unfolding to a three-dimensional measurement
    over muon momentum, muon scattering angle, and neutrino energy. The unfolded measurement covers an
    extensive phase space, providing a wealth of information useful for future liquid argon time projection
    chamber experiments measuring neutrino oscillations. Comparisons against a number of commonly used
    model predictions are included and their performance in different parts of the available phase-space
    is discussed.
