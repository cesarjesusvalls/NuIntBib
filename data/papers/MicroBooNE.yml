  title: First measurement of differential cross sections for muon neutrino charged current interactions
    on argon with a two-proton final state using the MicroBooNE detector
  collaboration: MicroBooNE
  arxiv: '2211.03734'
  doi: 10.1016/j.physletb.2025.140052
  journal: Phys.Lett.B
  volume: '872'
  pages: '140052'
  year: 2026
  published_date: '2022-11-07'
  inspire_recid: 2177350
  citation_count: 20
  abstract: We present the first measurement of differential cross sections for charged-current muon neutrino
    interactions on argon with one muon, two protons, and no pions in the final state. These final states
    are dominated by two-nucleon knockout interactions, which are complicated to model and for which there
    is currently limited information about the characteristics of these interactions in existing neutrino-nucleus
    scattering data. Detailed investigations of two-nucleon knockout are vital to support upcoming experiments
    exploring the nature of the neutrino. Among the different kinematic quantities measured, the opening
    angle between the two protons, the angle between the total proton momentum and the muon, and the total
    transverse momentum of the final state system are most sensitive to the underlying physics processes
    as embodied in various theoretical models.
