- bibtag: MINERvA:2013kdn
  title: Measurement of Muon Neutrino Quasielastic Scattering on a Hydrocarbon  Target at $E_\nu \sim
    3.5$ GeV
  collaboration: MINERvA
  arxiv: '1305.2243'
  doi: 10.1103/PhysRevLett.111.022502
  journal: Phys.Rev.Lett.
  volume: '111'
