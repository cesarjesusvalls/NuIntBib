- bibtag: Bell:1978qu
  title: Cross-section Measurements for the Reactions $\nu p \to \mu^- \pi^+ p$ and $\nu p \to \mu^- K^+
    p$ at High-Energies
  collaboration: FNAL
  arxiv: null
  doi: 10.1103/PhysRevLett.41.1008
  journal: Phys.Rev.Lett.
  volume: '41'
  pages: '1008'
  year: 1978
  published_date: 1978-08
  inspire_recid: 131344
  citation_count: 102
  abstract: We present results for the reactions νp→μ−π+p and νp→μ−K+p at energies above 5 GeV. The average
    cross section for the first reaction between 15 and 40 GeV is (0.80±0.12) × 10−38 cm2 and for events
    with Mπ+p<1.4 GeV is (0.55±0.08) × 10−38 cm2. The ratio of the cross section for the second reaction
    to that for the first is 0.017±0.010.
  added: '2026-06-16'
