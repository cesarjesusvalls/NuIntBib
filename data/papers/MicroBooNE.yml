- bibtag: MicroBooNE:2024sec
  title: First Double-Differential Cross Section Measurement of Neutral-Current <math display="inline"><msup><mi>π</mi><mn>0</mn></msup></math>
    Production in Neutrino-Argon Scattering in the MicroBooNE Detector
  collaboration: MicroBooNE
  arxiv: '2404.10948'
