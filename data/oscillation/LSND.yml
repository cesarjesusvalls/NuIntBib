- bibtag: LSND:2005oop
  title: Tests of Lorentz violation in anti-nu(mu) ---> anti-nu(e) oscillations
  collaboration: LSND
  arxiv: hep-ex/0506067
  doi: 10.1103/PhysRevD.72.076004
  journal: Phys.Rev.D
  volume: '72'
  pages: '076004'
  year: 2005
  published_date: 2005-06
  inspire_recid: 686013
  citation_count: 150
  abstract: A recently developed Standard-Model Extension (SME) formalism for neutrino oscillations that
    includes Lorentz and CPT violation is used to analyze the sidereal time variation of the neutrino
    event excess measured by the Liquid Scintillator Neutrino Detector (LSND) experiment. The LSND experiment,
    performed at Los Alamos National Laboratory, observed an excess, consistent with neutrino oscillations,
    of ${\bar\nu}_e$ in a beam of ${\bar\nu}_\mu$. It is determined that the LSND oscillation signal is
    consistent with no sidereal variation. However, there are several combinations of SME coefficients
    that describe the LSND data; both with and without sidereal variations. The scale of Lorentz and CPT
    violation extracted from the LSND data is of order $10^{-19}$ GeV for the SME coefficients $a_L$ and
    $E \times c_L$. This solution for Lorentz and CPT violating neutrino oscillations may be tested by
    other short baseline neutrino oscillation experiments, such as the MiniBooNE experiment.
  added: '2026-06-21'
